<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議文件 · 高榮企業工會</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#B7860B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="會議文件">
<meta name="description" content="工會會議：開會通知、議程、簽到表、會議紀錄。">
<link rel="apple-touch-icon" href="assets/union-icon-180.png">
<link rel="manifest" href="meeting.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     會議文件（離線、純前端、免金鑰）— 文書理事用。
     一份會議可產生：開會通知／議程、簽到表（自動帶入名冊在會會員、
     過半法定人數檢查）、會議紀錄。資料只存本機 localStorage。
     簽到讀取 roster_members_v1（會員名冊頁）之在會會員。
     ============================================================ */
  :root{
    --red:#C0392B; --red-deep:#7B1818; --red-light:#FDECEA;
    --gold:#B7860B; --gold-deep:#8A6309; --gold-light:#FEF9E7; --amber:#B7791F; --amber-light:#FEF5E7;
    --ink:#1A1A1A; --ink-mid:#444; --ink-soft:#777; --bg:#FBF7EC;
    --card:#FFFFFF; --border:#EAE2CC;
    --green:#1A7A4A; --green-mid:#2D9D6E; --green-deep:#0F5C36; --green-light:#EAFAF1;
    --navy:#1A3A6B; --navy-mid:#2E5C8A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7;-webkit-text-size-adjust:100%;}
  button{font-family:inherit;}

  #gate{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#8A6309 0%,#5C4006 100%);display:none;align-items:center;justify-content:center;padding:1.5rem;}
  #gate.show{display:flex;}
  .gate-box{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:2rem 1.5rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .gate-box h2{font-family:'Noto Serif TC',serif;color:var(--gold-deep);font-size:20px;margin-bottom:6px;}
  .gate-box p{font-size:13px;color:var(--ink-soft);margin-bottom:1.25rem;}
  .gate-box input{width:100%;padding:.8rem 1rem;font-size:16px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;text-align:center;}
  .gate-box input:focus{outline:none;border-color:var(--gold);}
  .gate-box button{width:100%;padding:.8rem;font-size:15px;color:#fff;background:var(--gold);border:none;border-radius:10px;cursor:pointer;}
  .gate-err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px;}

  .header{background:var(--gold);color:#fff;padding:1.5rem 1.25rem 1.2rem;text-align:center;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08);}
  .header-label{font-size:11px;letter-spacing:.18em;opacity:.9;margin-bottom:4px;}
  .header h1{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;}
  .header-sub{font-size:12.5px;opacity:.95;margin-top:6px;}
  .back{position:absolute;left:12px;top:14px;color:#fff;text-decoration:none;font-size:13px;opacity:.95;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;cursor:pointer;}

  main{max-width:640px;margin:0 auto;padding:1rem 1rem 4rem;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:.78rem;font-size:15px;font-weight:600;color:#fff;background:var(--gold);border:none;border-radius:11px;cursor:pointer;}
  .btn:active{background:var(--gold-deep);}
  .btn.ghost{background:#fff;color:var(--gold-deep);border:1.5px solid var(--gold);}
  .btn.sm{width:auto;padding:.55rem .9rem;font-size:13px;border-radius:9px;}
  .btn.navy{background:var(--navy);} .btn.navy:active{background:#122A4F;}
  .btn.green{background:var(--green);} .btn.green:active{background:var(--green-deep);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}

  .mtg{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:.85rem .9rem;margin-bottom:10px;border-left:5px solid var(--gold);cursor:pointer;}
  .mtg .mt{font-size:16px;font-weight:700;color:var(--ink);}
  .mtg .md{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}
  .empty{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:2rem 1rem;background:var(--card);border:1px dashed var(--border);border-radius:14px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem;}
  .card h3{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold-deep);margin-bottom:.6rem;}
  label{display:block;font-size:12.5px;color:var(--ink-soft);font-weight:600;margin:.55rem 0 .25rem;}
  input,select,textarea{width:100%;padding:.6rem .7rem;font-size:15px;border:1.4px solid var(--border);border-radius:9px;font-family:inherit;background:#fff;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .ag{display:flex;gap:8px;align-items:flex-start;background:var(--gold-light);border:1px solid var(--border);border-radius:10px;padding:.55rem .6rem;margin-bottom:7px;}
  .ag .k{flex-shrink:0;width:84px;}
  .ag .k select{padding:.35rem .3rem;font-size:12.5px;}
  .ag .body{flex:1;min-width:0;}
  .ag .body input{border:none;background:transparent;padding:.2rem 0;font-size:14.5px;font-weight:600;}
  .ag .body textarea{border:none;background:transparent;padding:.1rem 0;font-size:13px;min-height:20px;resize:vertical;color:var(--ink-mid);}
  .ag .rm{flex-shrink:0;background:none;border:none;color:var(--red);font-size:17px;cursor:pointer;}

  .signbox{background:var(--card);border:1px solid var(--border);border-radius:12px;max-height:260px;overflow:auto;padding:.4rem;}
  .srow{display:flex;align-items:center;gap:10px;padding:.4rem .5rem;border-bottom:1px solid #F2ECDC;}
  .srow:last-child{border-bottom:none;}
  .srow input[type=checkbox]{width:20px;height:20px;flex-shrink:0;}
  .srow .sn{font-weight:600;} .srow .sd{font-size:12px;color:var(--ink-soft);margin-left:auto;}

  .quorum{display:flex;justify-content:space-between;align-items:center;background:var(--green-light);color:var(--green-deep);border-radius:11px;padding:.7rem .8rem;font-weight:700;margin:.6rem 0;}
  .quorum.no{background:var(--red-light);color:var(--red-deep);}
  .quorum .v{font-family:'Noto Serif TC',serif;font-size:18px;}

  .law{font-size:12px;color:var(--ink-soft);border-left:3px solid var(--border);padding-left:9px;margin:.5rem 0 .9rem;line-height:1.7;}
  .note{font-size:12.5px;color:var(--ink-soft);background:var(--amber-light);border:1px solid #F0DBA8;border-radius:10px;padding:.7rem .8rem;margin:.6rem 0;line-height:1.7;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;padding:.6rem 1.1rem;border-radius:30px;opacity:0;pointer-events:none;transition:.25s;z-index:300;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .view{display:none;} .view.on{display:block;}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>會議文件</h2>
    <p>本頁供文書理事製作會議文件，限幹部使用。</p>
    <input id="gate-pw" type="password" inputmode="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="幹部通行碼" enterkeyhint="go">
    <button id="gate-go">進入</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="header">
    <a class="back" id="back" href="union.html">‹ 功能表</a>
    <div class="header-label">高榮企業工會 · 文書理事</div>
    <h1>🗂 會議文件</h1>
    <div class="header-sub">議程 · 簽到表 · 會議紀錄</div>
  </header>

  <main>
    <!-- 列表 -->
    <section class="view on" id="view-list">
      <div class="btn-row" style="margin-bottom:1rem"><button class="btn" id="new-btn">＋ 建立新會議</button></div>
      <div id="mtg-list"></div>
      <p class="law">簽到表會自動帶入「會員名冊」中<b>在會</b>的會員；若名冊還沒建，可先到組織理事的「會員名冊」新增，或在簽到表手動補列席者。</p>
    </section>

    <!-- 編輯 -->
    <section class="view" id="view-edit">
      <div class="card">
        <h3>會議基本資料</h3>
        <div class="grid2">
          <div><label>會議種類</label>
            <select id="m-type">
              <option>會員大會</option><option>會員代表大會</option><option>理事會</option>
              <option>監事會</option><option>理監事聯席會議</option><option>臨時會議</option>
            </select></div>
          <div><label>屆次／會次</label><input id="m-no" placeholder="第一屆第一次"></div>
        </div>
        <div class="grid2">
          <div><label>日期</label><input id="m-date" type="date"></div>
          <div><label>時間</label><input id="m-time" type="time"></div>
        </div>
        <label>地點</label><input id="m-place" placeholder="例：高榮第一會議室">
        <div class="grid2">
          <div><label>主席</label><input id="m-chair" placeholder="○○○"></div>
          <div><label>記錄</label><input id="m-rec" placeholder="○○○"></div>
        </div>
      </div>

      <div class="card">
        <h3>議程</h3>
        <div id="ag-list"></div>
        <div class="btn-row"><button class="btn ghost sm" id="ag-add">＋ 議程項目</button><button class="btn ghost sm" id="ag-seed">範例議程</button></div>
        <div class="note">提示：<b>修改章程、財產處分、合併分立解散、罷免、會員除名</b>等屬重大事項，須較高出席與同意門檻（章程第32條/第24條）。</div>
      </div>

      <div class="card">
        <h3>簽到 / 出席</h3>
        <div id="sign-wrap"></div>
        <div class="quorum" id="quorum"><span>出席 <span id="q-present">0</span> ／ 應到 <span id="q-total">0</span> 人</span><span class="v" id="q-msg">—</span></div>
        <label>列席／來賓（每行一位，不計入法定人數）</label>
        <textarea id="m-guest" style="min-height:46px" placeholder="例：張○○（顧問）"></textarea>
      </div>

      <div class="card">
        <h3>產出文件</h3>
        <div class="btn-row">
          <button class="btn navy sm" data-doc="notice">📄 開會通知／議程</button>
          <button class="btn green sm" data-doc="sign">✍ 簽到表</button>
          <button class="btn sm" data-doc="minutes">📝 會議紀錄</button>
        </div>
        <p class="law" style="margin-top:.7rem">點選後開新視窗，可直接列印或存成 PDF。會議紀錄會帶入各議程的決議內容。</p>
      </div>

      <div class="btn-row">
        <button class="btn ghost sm" id="save-btn">💾 儲存會議</button>
        <button class="btn ghost sm" id="del-btn" style="color:var(--red);border-color:#E7B4AE">🗑 刪除</button>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* 密碼鎖（共用通行碼 gaorong2026） */
const LOCK=false, PW_HASH="1621267407177439", UNLOCK_KEY="union_panel_unlocked";
function cyrb53(s,seed=0){ s=s||""; let h1=0xdeadbeef^seed,h2=0x41c6ce57^seed; for(let i=0,c;i<s.length;i++){c=s.charCodeAt(i);h1=Math.imul(h1^c,2654435761);h2=Math.imul(h2^c,1597334677);} h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909); return ""+(4294967296*(2097151&h2)+(h1>>>0)); }
const gate=document.getElementById('gate'),app=document.getElementById('app');
function showApp(){ gate.classList.remove('show'); app.style.display='block'; init(); }
function showGate(){ gate.classList.add('show'); app.style.display='none'; setTimeout(()=>document.getElementById('gate-pw').focus(),100); }
function tryUnlock(){ const v=document.getElementById('gate-pw').value.trim(); if(cyrb53(v)===PW_HASH){ try{sessionStorage.setItem(UNLOCK_KEY,'1');}catch(_){} showApp(); } else { document.getElementById('gate-err').textContent='通行碼不對，請再試一次或詢問負責幹部'; } }
document.getElementById('gate-go').addEventListener('click',tryUnlock);
document.getElementById('gate-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });

/* 資料 */
const KEY="meetings_v1", ROSTER_KEY="roster_members_v1";
let meetings=[], cur=null;
function load(){ try{meetings=JSON.parse(localStorage.getItem(KEY))||[];}catch(_){meetings=[];} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(meetings));}catch(_){} }
function activeMembers(){ try{ return (JSON.parse(localStorage.getItem(ROSTER_KEY))||[]).filter(m=>m.status==='active'); }catch(_){ return []; } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function rocDate(ds){ if(!ds) return '中華民國　年　月　日'; const p=ds.split('-'); return `中華民國${p[0]-1911}年${+p[1]}月${+p[2]}日`; }
const $=id=>document.getElementById(id);
const AG_KINDS=['報告事項','討論事項','選舉事項','臨時動議'];
const AG_SEED=[
 {kind:'報告事項',title:'上次會議決議執行情形報告',decision:''},
 {kind:'報告事項',title:'會務及財務報告',decision:''},
 {kind:'討論事項',title:'',decision:''},
 {kind:'臨時動議',title:'',decision:''},
];

/* 列表 */
function renderList(){
  const box=$('mtg-list');
  if(!meetings.length){ box.innerHTML='<div class="empty">尚無會議，按「＋ 建立新會議」開始。</div>'; return; }
  const sorted=meetings.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  box.innerHTML=sorted.map(m=>`<div class="mtg" data-id="${m.id}">
      <div class="mt">${esc(m.type||'會議')}${m.no?'　'+esc(m.no):''}</div>
      <div class="md">📅 ${m.date||'未定日期'} ${m.time||''}　📍 ${esc(m.place||'—')}　議程 ${m.agenda?m.agenda.length:0} 案</div>
    </div>`).join('');
}
$('mtg-list').addEventListener('click',e=>{ const el=e.target.closest('[data-id]'); if(!el) return; openEdit(meetings.find(m=>m.id===el.dataset.id)); });

/* 切換視圖 */
function showView(v){ document.querySelectorAll('.view').forEach(x=>x.classList.remove('on')); $('view-'+v).classList.add('on'); window.scrollTo({top:0}); }
$('new-btn').addEventListener('click',()=>{
  cur={id:uid(),type:'會員大會',no:'',date:'',time:'',place:'',chair:'',rec:'',guest:'',agenda:[],present:{}};
  fillForm(); showView('edit');
});
$('back').addEventListener('click',e=>{
  if($('view-edit').classList.contains('on')){ e.preventDefault(); load(); renderList(); showView('list'); }
});

/* 編輯填表 */
function openEdit(m){ cur=JSON.parse(JSON.stringify(m)); if(!cur.present)cur.present={}; if(!cur.agenda)cur.agenda=[]; fillForm(); showView('edit'); }
function fillForm(){
  $('m-type').value=cur.type||'會員大會'; $('m-no').value=cur.no||''; $('m-date').value=cur.date||'';
  $('m-time').value=cur.time||''; $('m-place').value=cur.place||''; $('m-chair').value=cur.chair||'';
  $('m-rec').value=cur.rec||''; $('m-guest').value=cur.guest||'';
  renderAgenda(); renderSign();
}
function pull(){
  cur.type=$('m-type').value; cur.no=$('m-no').value.trim(); cur.date=$('m-date').value; cur.time=$('m-time').value;
  cur.place=$('m-place').value.trim(); cur.chair=$('m-chair').value.trim(); cur.rec=$('m-rec').value.trim(); cur.guest=$('m-guest').value.trim();
}
['m-type','m-no','m-date','m-time','m-place','m-chair','m-rec','m-guest'].forEach(id=>$(id).addEventListener('input',pull));

/* 議程 */
function renderAgenda(){
  $('ag-list').innerHTML=cur.agenda.map((a,i)=>`<div class="ag" data-i="${i}">
      <div class="k"><select data-f="kind">${AG_KINDS.map(k=>`<option ${a.kind===k?'selected':''}>${k}</option>`).join('')}</select></div>
      <div class="body">
        <input data-f="title" value="${esc(a.title)}" placeholder="案由／案名">
        <textarea data-f="decision" placeholder="決議（會後填寫）">${esc(a.decision)}</textarea>
      </div>
      <button class="rm" data-rm="${i}">×</button>
    </div>`).join('');
}
$('ag-list').addEventListener('input',e=>{ const inp=e.target.closest('[data-f]'); if(!inp) return; const i=+inp.closest('.ag').dataset.i; cur.agenda[i][inp.dataset.f]=inp.value; });
$('ag-list').addEventListener('click',e=>{ const b=e.target.closest('[data-rm]'); if(!b) return; cur.agenda.splice(+b.dataset.rm,1); renderAgenda(); });
$('ag-add').addEventListener('click',()=>{ cur.agenda.push({kind:'討論事項',title:'',decision:''}); renderAgenda(); });
$('ag-seed').addEventListener('click',()=>{ AG_SEED.forEach(s=>cur.agenda.push(Object.assign({},s))); renderAgenda(); });

/* 簽到 */
function renderSign(){
  const mem=activeMembers(), wrap=$('sign-wrap');
  if(!mem.length){ wrap.innerHTML='<div class="empty" style="padding:1.2rem">名冊尚無「在會」會員。<br>可先到「會員名冊」建立，或於下方列席欄手動補。</div>'; updateQuorum(0,0); return; }
  wrap.innerHTML='<div class="signbox">'+mem.map(m=>`<label class="srow">
      <input type="checkbox" data-mid="${m.id}" ${cur.present[m.id]?'checked':''}>
      <span class="sn">${esc(m.name)}</span><span class="sd">${esc([m.dept,m.title].filter(Boolean).join(' '))}</span>
    </label>`).join('')+'</div>';
  updateQuorum();
}
$('sign-wrap').addEventListener('change',e=>{ const c=e.target.closest('[data-mid]'); if(!c) return; if(c.checked)cur.present[c.dataset.mid]=1; else delete cur.present[c.dataset.mid]; updateQuorum(); });
function updateQuorum(){
  const total=activeMembers().length;
  const present=activeMembers().filter(m=>cur.present[m.id]).length;
  $('q-present').textContent=present; $('q-total').textContent=total;
  const q=$('quorum'), need=Math.floor(total/2)+1;
  if(total>0 && present>=need){ q.classList.remove('no'); $('q-msg').textContent='✓ 已過半，達開會法定人數'; }
  else { q.classList.add('no'); $('q-msg').textContent=total>0?`未過半（需 ${need} 人）`:'尚無名冊'; }
}

/* 儲存／刪除 */
$('save-btn').addEventListener('click',()=>{
  pull(); const idx=meetings.findIndex(m=>m.id===cur.id);
  if(idx>=0) meetings[idx]=cur; else meetings.push(cur);
  save(); toast('已儲存會議'); load(); renderList(); showView('list');
});
$('del-btn').addEventListener('click',()=>{
  if(!confirm('刪除這場會議？')) return;
  meetings=meetings.filter(m=>m.id!==cur.id); save(); renderList(); showView('list'); toast('已刪除');
});

/* 產出文件 */
function openDoc(title,bodyHTML){
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>${title}</title>
    <style>
    @page{margin:2cm;} body{font-family:'Noto Serif TC',serif;color:#000;font-size:15px;line-height:2;padding:1.5rem;max-width:780px;margin:0 auto;}
    h1{text-align:center;font-size:21px;margin-bottom:.3rem;} .sub{text-align:center;font-size:14px;margin-bottom:1.2rem;}
    .meta{margin:.2rem 0;} .meta b{display:inline-block;min-width:5em;}
    table{width:100%;border-collapse:collapse;margin-top:.6rem;} th,td{border:1px solid #555;padding:.45rem .5rem;font-size:14px;}
    th{background:#f0f0f0;} .c{text-align:center;} ol{margin:.2rem 0 .8rem 1.5rem;} li{margin-bottom:.3rem;}
    .h2{font-weight:700;font-size:16px;margin:1rem 0 .3rem;border-bottom:1.5px solid #000;padding-bottom:2px;}
    .sign-line{margin-top:2.5rem;} @media print{button{display:none;}}
    button{margin:1rem .3rem;padding:.5rem 1.2rem;font-size:14px;cursor:pointer;}
    </style></head><body>${bodyHTML}
    <div style="text-align:center"><button onclick="window.print()">🖨 列印 / 存 PDF</button><button onclick="window.close()">關閉</button></div>
    </body></html>`);
  w.document.close();
}
function header(){ return `<h1>高雄榮民總醫院企業工會</h1>`; }
function agendaOL(){
  let html=''; AG_KINDS.forEach(k=>{
    const items=cur.agenda.filter(a=>a.kind===k && a.title);
    if(items.length){ html+=`<div class="h2">${k}</div><ol>`+items.map(a=>`<li>${esc(a.title)}</li>`).join('')+`</ol>`; }
  });
  return html||'<p>（議程待補）</p>';
}
function docNotice(){
  return header()+`<div class="sub">${esc(cur.type)}　${esc(cur.no)}　開會通知（議程）</div>
    <div class="meta"><b>開會時間</b>：${rocDate(cur.date)} ${cur.time||''}</div>
    <div class="meta"><b>開會地點</b>：${esc(cur.place||'＿＿＿＿')}</div>
    <div class="meta"><b>主　　席</b>：${esc(cur.chair||'＿＿＿')}</div>
    <div class="meta" style="margin-top:.6rem">敬請　準時出席。如不克出席，請事先請假。</div>
    <div style="margin-top:1rem">${agendaOL()}</div>`;
}
function docSign(){
  const mem=activeMembers();
  const total=mem.length, present=mem.filter(m=>cur.present[m.id]).length, need=Math.floor(total/2)+1;
  let rows=mem.map((m,i)=>`<tr><td class="c">${i+1}</td><td>${esc(m.name)}</td><td>${esc(m.dept||'')}</td><td></td></tr>`).join('');
  for(let i=0;i<4;i++) rows+=`<tr><td class="c">${mem.length+i+1}</td><td></td><td></td><td></td></tr>`;
  return header()+`<div class="sub">${esc(cur.type)}　${esc(cur.no)}　會議簽到表</div>
    <div class="meta"><b>開會時間</b>：${rocDate(cur.date)} ${cur.time||''}</div>
    <div class="meta"><b>開會地點</b>：${esc(cur.place||'＿＿＿＿')}</div>
    <div class="meta"><b>法定人數</b>：應到 ${total} 人，過半需 ${total?need:'＿'} 人（章程第32條：會員過半數出席始得開會）</div>
    <table><thead><tr><th style="width:3em">編號</th><th>姓名</th><th>單位</th><th style="width:30%">簽　名</th></tr></thead><tbody>${rows}</tbody></table>
    ${cur.guest?`<div class="h2">列席／來賓</div><p>${esc(cur.guest).replace(/\n/g,'、')}</p>`:''}
    <div class="meta" style="margin-top:1rem">實到：＿＿＿ 人　　主席：＿＿＿＿　　記錄：＿＿＿＿</div>`;
}
function docMinutes(){
  const mem=activeMembers(), present=mem.filter(m=>cur.present[m.id]);
  let html=header()+`<div class="sub">${esc(cur.type)}　${esc(cur.no)}　會議紀錄</div>
    <div class="meta"><b>時　　間</b>：${rocDate(cur.date)} ${cur.time||''}</div>
    <div class="meta"><b>地　　點</b>：${esc(cur.place||'＿＿＿＿')}</div>
    <div class="meta"><b>出席會員</b>：${present.length} 人（應到 ${mem.length} 人）${present.length?'　'+present.map(m=>esc(m.name)).join('、'):''}</div>
    ${cur.guest?`<div class="meta"><b>列　　席</b>：${esc(cur.guest).replace(/\n/g,'、')}</div>`:''}
    <div class="meta"><b>主　　席</b>：${esc(cur.chair||'＿＿＿')}　　<b style="min-width:auto">記錄</b>：${esc(cur.rec||'＿＿＿')}</div>`;
  AG_KINDS.forEach(k=>{
    const items=cur.agenda.filter(a=>a.kind===k && a.title);
    if(items.length){ html+=`<div class="h2">${k}</div><ol>`+items.map(a=>`<li>${esc(a.title)}${a.decision?`<br><b>決議：</b>${esc(a.decision)}`:'<br>決議：＿＿＿＿＿＿＿＿'}</li>`).join('')+`</ol>`; }
  });
  html+=`<div class="sign-line">主席：＿＿＿＿＿＿　　　記錄：＿＿＿＿＿＿</div>`;
  return html;
}
document.querySelectorAll('[data-doc]').forEach(b=>b.addEventListener('click',()=>{
  pull();
  const d=b.dataset.doc;
  if(d==='notice') openDoc('開會通知',docNotice());
  else if(d==='sign') openDoc('簽到表',docSign());
  else openDoc('會議紀錄',docMinutes());
}));

let toastT; function toast(m){ const e=$('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>e.classList.remove('show'),1900); }
function init(){ load(); renderList(); showView('list'); }

if(!LOCK){ showApp(); }
else if(sessionStorage.getItem(UNLOCK_KEY)==='1'){ showApp(); }
else { showGate(); }
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
