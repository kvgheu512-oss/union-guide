<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幹部名單管理 · 高榮企業工會</title>
<meta name="theme-color" content="#1B7536">
<style>
  :root{ --navy:#0E1E3A; --gold:#B7860B; --gold-bg:#FEF9E7; --gold-border:#EAD67A;
         --green:#1B7536; --border:#DDE3EE; --bg:#F4F6FA; --ink:#1A2332; --soft:#6B7A95; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .bar{background:linear-gradient(160deg,#1A3A6B 0%,#0E1E3A 100%);color:#fff;padding:14px 16px 12px;text-align:center}
  .bar h1{font-size:17px;font-weight:700}
  .bar p{font-size:12px;opacity:.8;margin-top:3px}
  main{max-width:560px;margin:0 auto;padding:16px 14px 60px}
  .note{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:10px;
    padding:11px 13px;font-size:13px;color:#5C4000;line-height:1.7;margin-bottom:16px}
  .note b{color:#7A5600}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
  .role-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .role-row:last-child{margin-bottom:0}
  .badge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
  .badge.chair{background:#C0392B} .badge.fin{background:#1B7536} .badge.doc{background:#B7860B}
  .badge.wel{background:#6C3483} .badge.sup{background:#0E1E3A}
  .role-label{font-size:13px;font-weight:600;color:var(--soft);width:72px;flex-shrink:0}
  .role-input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:8px 10px;
    font-size:15px;font-family:inherit;color:var(--ink);background:#fff}
  .role-input:focus{outline:none;border-color:#1B7536;box-shadow:0 0 0 3px rgba(27,117,54,.12)}
  .role-input.empty{border-color:#ddd;color:#aaa}
  .del-btn{width:32px;height:32px;border:1.5px solid #E8A29A;background:#fff;border-radius:8px;
    color:#C0392B;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .del-btn:active{background:#FDECEA}
  .section-head{font-size:12px;font-weight:700;color:var(--soft);letter-spacing:.5px;
    margin:16px 0 8px 2px;text-transform:uppercase}
  .btn{display:block;width:100%;border:none;border-radius:12px;padding:13px;
    font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
  .btn-save{background:var(--green);color:#fff}
  .btn-pub{background:var(--navy);color:#fff}
  .btn:disabled{opacity:.4}
  .toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:rgba(20,20,30,.88);color:#fff;font-size:14px;font-weight:600;padding:10px 20px;
    border-radius:24px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:999}
  .toast.show{opacity:1}
  .pub-box{display:none;margin-top:12px;background:#0E1626;border-radius:10px;padding:12px}
  .pub-box textarea{width:100%;background:#0E1626;color:#7EE8C2;border:none;font-family:monospace;
    font-size:11.5px;resize:none;height:120px;outline:none}
  .pub-box .pub-hint{font-size:12px;color:#7EE8C2;margin-bottom:6px}
  .pub-box .pub-btns{display:flex;gap:8px;margin-top:8px}
  .pub-btns button{flex:1;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}
  .pub-btns .copy-btn{background:#16C2A3;color:#062b25}
  .pub-btns .dl-btn{background:#2d3a4f;color:#fff}
  .role-title-input{flex:0 0 80px;border:1.5px solid var(--gold-border);border-radius:9px;padding:8px 8px;
    font-size:13px;font-family:inherit;color:var(--ink);background:#FEFBF0;text-align:center}
</style>
<link rel="stylesheet" href="common.css">
</head>
<body>

<a href="union.html" onclick="return ebnBack(this.getAttribute('href'),event)"
   style="position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:9999;
   background:#fff;color:#333;border:1px solid rgba(0,0,0,.12);font-weight:600;font-size:13px;
   text-decoration:none;padding:6px 12px;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.2)">‹ 功能表</a>

<div class="bar">
  <h1>👥 幹部名單管理</h1>
  <p>改完按「儲存」，按「發布同步」讓所有人看到</p>
</div>

<main>
  <div class="note">
    💡 <b>改了就按儲存</b>，這支手機馬上生效。<br>
    要讓<b>所有人</b>都看到更新，再按下面的「<b>發布同步</b>」，把產生的內容交給網站維護者上線即可。<br>
    名字留空＝該職務從缺，不會顯示在對外頁面。
  </div>

  <div class="section-head">幹部名單</div>
  <div class="card" id="cadreList"><!-- 由 JS 渲染 --></div>
  <button class="btn" style="background:#fff;border:2px dashed #B7860B;color:#7A5600;margin-top:8px" onclick="addCustomRole()">＋ 新增幹部職務</button>

  <button class="btn btn-save" id="saveBtn" onclick="saveCadres()">💾 儲存到這支手機</button>
  <button class="btn btn-pub" id="pubBtn" onclick="publish()">📢 發布同步（讓所有人看到）</button>

  <div class="pub-box" id="pubBox">
    <div class="pub-hint">把下面這段 JSON 複製後交給網站維護者，或直接下載 public.json 放到 repo：</div>
    <textarea id="pubOut" readonly></textarea>
    <div class="pub-btns">
      <button class="copy-btn" onclick="copyPub()">📋 複製</button>
      <button class="dl-btn" onclick="dlPub()">⬇️ 下載 public.json</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="org.js" defer></script>
<script>
var CUSTOM_KEY = 'ebn_cadres_custom_v1';
function getCustomRoles(){ try{ return JSON.parse(localStorage.getItem(CUSTOM_KEY)||'[]'); }catch(_){ return []; } }
function saveCustomRoles(arr){ try{ localStorage.setItem(CUSTOM_KEY, JSON.stringify(arr)); }catch(_){} }

var ROLES_META = {
  chair:{ label:'理事長', badge:'chair', hint:'綜理會務・對外代表' },
  fin:  { label:'總務（一）', badge:'fin', hint:'財務・收支記帳' },
  fin2: { label:'總務（二）', badge:'fin', hint:'協助財務・備援' },
  doc:  { label:'法規（一）', badge:'doc', hint:'法規・勞資爭議' },
  doc2: { label:'法規（二）', badge:'doc', hint:'協助法規' },
  wel:  { label:'文宣',      badge:'wel', hint:'文宣・社群' },
  sup:  { label:'監事',      badge:'sup', hint:'監察會務・財務稽核' }
};

function renderList(){
  var wrap = document.getElementById('cadreList');
  if(!wrap || !window.EBNOrg) return;
  var data = EBNOrg.cadres();
  wrap.innerHTML = '';
  // 固定職務
  EBNOrg.CADRE_ROLES.forEach(function(pair){
    var key=pair[0], meta=ROLES_META[key]||{label:pair[1],badge:'sup',hint:''};
    var val = data[key]||'';
    var row = document.createElement('div'); row.className='role-row';
    row.innerHTML =
      '<div class="badge '+meta.badge+'">'+meta.label.slice(0,2)+'</div>'+
      '<div class="role-label">'+meta.label+'</div>'+
      '<input class="role-input'+(val?'':' empty')+'" data-key="'+key+'" '+
        'value="'+esc(val)+'" placeholder="（從缺）" '+
        'oninput="this.classList.toggle(\'empty\',!this.value)">'+
      '<button class="del-btn" title="清空此職務" onclick="clearRole(\''+key+'\')">✕</button>';
    wrap.appendChild(row);
  });
  // 自訂職務
  getCustomRoles().forEach(function(c, i){
    appendCustomRow(wrap, c.title||'', c.name||'', i);
  });
}

function appendCustomRow(wrap, title, name, idx){
  var row = document.createElement('div'); row.className='role-row'; row.dataset.cidx=idx;
  row.innerHTML =
    '<div class="badge sup" style="font-size:11px;background:#B7860B">自</div>'+
    '<input class="role-title-input" data-cidx="'+idx+'" placeholder="職稱" value="'+esc(title)+'" '+
      'oninput="updateCustomTitle('+idx+',this.value)">'+
    '<input class="role-input'+(name?'':' empty')+'" data-cname="'+idx+'" '+
      'value="'+esc(name)+'" placeholder="姓名" '+
      'oninput="updateCustomName('+idx+',this.value);this.classList.toggle(\'empty\',!this.value)">'+
    '<button class="del-btn" onclick="removeCustomRole('+idx+')">✕</button>';
  wrap.appendChild(row);
}

function addCustomRole(){
  var arr = getCustomRoles(); arr.push({title:'',name:''});
  saveCustomRoles(arr);
  var wrap = document.getElementById('cadreList');
  appendCustomRow(wrap, '', '', arr.length-1);
  wrap.lastElementChild.querySelector('.role-title-input').focus();
}
function updateCustomTitle(idx, val){
  var arr=getCustomRoles(); if(arr[idx]) arr[idx].title=val; saveCustomRoles(arr);
}
function updateCustomName(idx, val){
  var arr=getCustomRoles(); if(arr[idx]) arr[idx].name=val; saveCustomRoles(arr);
}
function removeCustomRole(idx){
  var arr=getCustomRoles(); arr.splice(idx,1); saveCustomRoles(arr); renderList();
}

function clearRole(key){
  var inp = document.querySelector('[data-key="'+key+'"]');
  if(inp){ inp.value=''; inp.classList.add('empty'); }
}

function collectData(){
  var obj={};
  // 固定職務
  document.querySelectorAll('.role-input[data-key]').forEach(function(inp){
    obj[inp.dataset.key] = inp.value.trim();
  });
  // 自訂職務（key 用 custom_0, custom_1…，title 另存 custom_title_0…）
  getCustomRoles().forEach(function(c,i){
    if(c.title||c.name){
      obj['custom_'+i] = c.name||'';
      obj['custom_title_'+i] = c.title||'';
    }
  });
  return obj;
}

function saveCadres(){
  if(!window.EBNOrg){ showToast('⚠️ 資料尚未載入，請稍候'); return; }
  EBNOrg.setCadres(collectData());
  showToast('✅ 已儲存到這支手機');
}

function publish(){
  if(!window.EBNOrg){ showToast('⚠️ 資料尚未載入，請稍候'); return; }
  // 先存一次
  var data=collectData(); EBNOrg.setCadres(data);
  // 產生完整 public.json（保留原有的 meet/sign/org 欄位）
  var full=EBNOrg.buildPublic();
  full.cadres=data;
  var json=JSON.stringify(full,null,2);
  document.getElementById('pubOut').value=json;
  document.getElementById('pubBox').style.display='block';
  document.getElementById('pubBox').scrollIntoView({behavior:'smooth'});
  showToast('✅ 已產生發布內容，請複製或下載');
}

function copyPub(){
  var ta=document.getElementById('pubOut');
  if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(function(){ showToast('✅ 已複製，貼給維護者說「發布這個」即可'); }); }
  else{ ta.select(); document.execCommand('copy'); showToast('✅ 已複製'); }
}
function dlPub(){
  var blob=new Blob([document.getElementById('pubOut').value],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='public.json'; a.click();
}

function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2200);
}
function esc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// org.js 載好後渲染
document.addEventListener('DOMContentLoaded', function(){
  if(window.EBNOrg) renderList();
  else{ var t=setInterval(function(){ if(window.EBNOrg){ clearInterval(t); renderList(); }},60); }
  document.addEventListener('ebnorg:public', renderList);
});
</script>

<div id="verBadge">v2026.06.25.00</div>
<script src="law-tips.js" defer></script>
<script src="common.js" defer></script>
</body>
</html>
