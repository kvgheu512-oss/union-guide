<style>
 :root{--ac:#7B1818;--ac2:#C0392B;--navy:#1A3A6B;--green:#0F5C36;--green2:#1A7A4A;--ink:#1A1A1A;--ink-soft:#777;--ink-mid:#444;--bg:#F7F6F3;--card:#fff;--border:#E6E1D8;--gold-light:#FEF9E7;}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.8}
 .header{background:linear-gradient(160deg,#4A0E0E,#7B1818);color:#fff;padding:1.7rem 1.2rem 1.3rem;text-align:center}
 .header h1{font-family:'Noto Serif TC',serif;font-size:21px}
 .header p{font-size:12.5px;opacity:.92;margin-top:6px;line-height:1.7}
 main{max-width:700px;margin:0 auto;padding:1.1rem 1rem 4rem}
 .intro{background:var(--gold-light);border:1px solid #EAD67A;border-radius:12px;padding:.85rem 1rem;font-size:13px;color:#5C4000;line-height:1.85;margin-bottom:1.1rem}
 .intro b{color:var(--ac)}
 .pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
 .pick button{font-size:12.5px;padding:.45rem .75rem;border-radius:9px;border:1.5px solid var(--border);background:#fff;color:var(--ac);cursor:pointer;font-family:inherit}
 .pick button.on{background:var(--ac);color:#fff;border-color:var(--ac)}
 .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:11px;overflow:hidden}
 .card>summary{list-style:none;cursor:pointer;padding:1rem 1.1rem;display:flex;gap:10px;align-items:flex-start}
 .card>summary::-webkit-details-marker{display:none}
 .card>summary .ic{font-size:22px;flex-shrink:0}
 .card>summary .qt{font-size:14.5px;font-weight:700;color:var(--ac2);line-height:1.5}
 .card>summary .qt .lbl{display:block;font-size:11px;color:var(--ink-soft);font-weight:400;margin-bottom:2px}
 .card>summary .arr{margin-left:auto;color:var(--ink-soft);transition:transform .2s}
 .card[open]>summary .arr{transform:rotate(90deg)}
 .body{padding:0 1.1rem 1.1rem}
 .sec-h{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;margin:.9rem 0 .4rem;display:flex;align-items:center;gap:6px}
 .sec-h.ref{color:var(--green2)} .sec-h.ev{color:var(--navy)}
 .ref-item{border-left:3px solid #BFE3CF;background:#F2FAF5;border-radius:0 8px 8px 0;padding:.55rem .75rem;margin-bottom:.5rem;font-size:13.5px;line-height:1.75}
 .ref-item b{color:var(--green)}
 .ev{font-size:13px;color:var(--ink-mid);line-height:1.9}
 .ev li{margin-left:1.1rem}
 .note{background:#FDF3F2;border:1px solid #F0C5C2;border-radius:9px;padding:.6rem .8rem;font-size:12.5px;color:#5C1010;line-height:1.75;margin-top:.7rem}
 .cp{margin-top:.8rem;background:var(--ac);color:#fff;border:none;border-radius:9px;padding:.6rem 1rem;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
 .cptoast{font-size:12px;color:var(--green2);font-weight:700;margin-left:8px}
 .vflag{color:#B7860B;font-size:11px}
 .more{display:inline-block;margin-top:.7rem;font-size:13px;color:var(--navy);font-weight:700;text-decoration:none}
 .foot{text-align:center;font-size:11.5px;color:var(--ink-soft);margin-top:1.4rem;line-height:1.8}
</style>

<body data-home="union.html">

<div class="header">
  <h1>⚔️ 勞資攻防演練</h1>
  <p>資方／主管常用的說法，先預演對方會怎麼講，<br>再用法條一條條打回去。知己知彼，才不會被話術唬住。</p>
</div>

<main>
  <div class="intro">
    🥋 <b>怎麼用</b>：每張卡片先列「<b style="color:#C0392B">🔴 資方可能這樣主張</b>」（站對方律師立場、講出最有力的說法），再給你「<b style="color:#0F5C36">⚖️ 法條反駁</b>」與「📎 要準備的證據」。<br>⚠️ <b>誠實提醒</b>：法律是個案判斷，對方也有殘存空間——卡片會一併點出你的弱點，要你補強，不是給你虛假信心。標 <span class="vflag">⚠待核對</span> 處請洽法規幹部或勞工局 1955。
  </div>

  <div class="pick" id="pick"></div>
  <div id="list"></div>

  <div class="foot">高雄榮民總醫院企業工會（籌備中）· 攻防演練<br><span class="vflag">⚠ 內容為一般法律整理、非正式法律意見；個案請洽工會幹部、律師或勞工局 1955</span></div>
</main>

<script>
var TOPICS=[
 { id:'hosp', cat:'請假就醫', ic:'🏥',
   attack:'依本院工作規則，員工請病假／職傷假須持「本院（高雄榮總）」診斷證明，否則不予認假。勞工請假規則第10條本來就允許雇主要求提出證明文件，這是查核權。',
   refutes:[
    ['勞工請假規則 §10','條文只授權雇主「要求<b>提出證明文件</b>」，<b>未授權指定就醫機構</b>。把「限本院就醫」當認假唯一條件，是擅自擴張法條。'],
    ['勞動基準法 §71','工作規則<b>違反法令</b>者無效。限定只能本院就醫、否則不認假，逾越請假規則授權、限制就醫自由，該規則自始無效。'],
    ['就醫自由','病人有自由選擇醫療機構之權利，<b>任一合法醫療院所</b>之診斷證明均有效力，雇主不得片面否認。'],
    ['職災認定 · 勞基法 §59、勞工職業災害保險及保護法','職災取決於「傷病與工作之因果」，由<b>勞保局／職業醫學專科</b>認定，非雇主本院說了算。'],
   ],
   evidence:['外院（任一合法院所）的診斷證明','請假申請紀錄與被否准的書面/對話','若職傷：事故當下證據、職災身分就醫紀錄'],
   note:'資方殘存空間：若工作規則僅要求「合理複檢」而非「唯一就醫」，且經核備、合比例，個案仍可能有爭執。所以外院診斷、申假與否准紀錄務必留存。 <span class="vflag">⚠待核對</span>',
   more:{t:'去蒐證指南（職災／請假）',u:'shouzheng.html'} },

 { id:'health', cat:'職災身分', ic:'🩹',
   attack:'你當初是用「健保」身分掛號看診的，表示這根本不是工作受傷，不能事後改稱職災要補償。',
   refutes:[
    ['因果為準，非掛號別','職災認定取決於<b>傷病與工作的因果關係</b>，不是取決於當下用健保或職傷掛號；用健保掛號<b>不改變職災的本質</b>。'],
    ['勞工職業災害保險及保護法','得<b>事後申請職災核退／認定</b>；一時誤用健保可補正、由勞保局與職業醫學科專業認定。'],
    ['勞基法 §59','雇主補償責任<b>不因掛號別而免除</b>。'],
   ],
   evidence:['事故發生當下的證據（時間、現場、目擊者）','補開的職業傷病／職災診斷','向主管或職安通報的紀錄'],
   note:'務實作法：盡速轉以職傷身分、請職業醫學科補開診斷；但「當下用健保」確實會被資方拿來打，所以因果證據要厚。',
   more:{t:'職災公傷維權專區',u:'zhizai.html'} },

 { id:'otapply', cat:'加班費', ic:'⏱',
   attack:'公司規定加班要「事先申請核准」，你沒申請就自己留下來，那是你自願的，不算加班、不給加班費。',
   refutes:[
    ['勞動基準法 §24','只要雇主<b>使勞工延長工時</b>、或<b>明知而不反對受領勞務</b>，就應給延長工時工資；「事先申請」是內部管理程序，<b>不得作為免除工資的理由</b>。'],
    ['勞動事件法 §38','出勤紀錄所載之時間<b>推定為工作時間</b>，舉證責任在雇主。'],
    ['受領勞務利益','雇主既受領加班的勞務成果，依誠信原則應給付對價。'],
   ],
   evidence:['出勤／打卡／門禁／電腦登入登出紀錄','主管下班後交辦工作的訊息（含時間戳）','工作產出與時間對應'],
   note:'弱點：若你完全無紀錄、又確實未被要求，資方會主張「未經同意之滯留」。所以工時與「被交辦」的證據要齊。',
   more:{t:'加班費試算',u:'leavepay.html'} },

 { id:'otyear', cat:'加班費', ic:'📆',
   attack:'加班費我們年底統一結算，用當月（12月）31天計算時薪，這是公司一貫做法。',
   refutes:[
    ['勞動基準法 §23','工資應<b>定期發給</b>（至少每月一次並提供明細）；累積大半年才發屬<b>遲延給付</b>。'],
    ['民法 §233、§203','遲延給付得請求<b>年息 5% 遲延利息</b>，自各月原應發日起算。'],
    ['時薪計算','加班費時薪以<b>平日每小時工資額（月薪÷30÷8）</b>計；用 ÷31 稀釋時薪、低於法定，差額應補。'],
   ],
   evidence:['歷月薪資明細（看計算方式）','寫明「年底結算」的公告/LINE','各月加班時數紀錄'],
   note:'',
   more:{t:'加班費試算',u:'leavepay.html'} },

 { id:'holiday', cat:'假日', ic:'📅',
   attack:'國定假日你來上班，我們給你「調休」補一天就好，不必再付加班費。',
   refutes:[
    ['勞動基準法 §39','國定假日出勤「工資應<b>加倍發給</b>」，條文<b>沒有</b>「補休可替代」的例外（§36 休息日才有）。'],
    ['月薪制本質','假日工資已含在月薪，出勤的「加倍」＝<b>月薪外再付 1 日工資</b>；只給調休＝額外補償為零，少給 1 日工資。'],
   ],
   evidence:['班表顯示假日出勤','調休通知/紀錄','薪資明細'],
   note:'',
   more:{t:'國定假日試算',u:'leavepay.html'} },

 { id:'parental', cat:'育嬰', ic:'👶',
   attack:'你申請育嬰留停會影響單位人力與營運，我們可以不准，或要你改排比較差的班、調職。',
   refutes:[
    ['性別平等工作法 §16','受僱滿 6 個月、子女滿 3 歲前得申請育嬰留停，<b>雇主不得拒絕</b>。 <span class="vflag">⚠待核對</span>'],
    ['性別平等工作法 §21','受僱者依法申請，雇主<b>不得拒絕，亦不得為不利之處分</b>（減薪、調職、考績打壓等）。'],
   ],
   evidence:['育嬰留停申請書與雇主回覆','被拒/刁難/復職受阻的書面或對話','同仁准駁對照'],
   note:'',
   more:{t:'蒐證指南（育嬰留停）',u:'shouzheng.html'} },

 { id:'union35', cat:'工會', ic:'🛡️',
   attack:'你的考績差、被調班、被調職，是依公司管理權與你的工作表現決定的，跟你參加工會一點關係都沒有。',
   refutes:[
    ['工會法 §35','雇主不得因勞工<b>組織、加入、參與工會活動</b>而為解僱、降調、減薪等<b>不利對待</b>（不當勞動行為）。'],
    ['裁決會審查「不當動機」','看<b>時間先後</b>（你參與工會 vs 被處分）與<b>差別待遇</b>；管理權<b>非無限</b>，有不當動機即違法。'],
    ['違法處分無效','可向勞動部申請<b>裁決</b>，違法的不利處分無效。'],
   ],
   evidence:['參與工會的證明＋雇主知情','處分前後待遇量化對照','雇主敵視工會的內部文件/言論','對其他工會成員的類似對待'],
   note:'時效最緊：裁決應自<b>知悉之日起 90 日內</b>提出，務必盡早。',
   more:{t:'蒐證指南（工會報復）',u:'shouzheng.html'} },

 { id:'fire', cat:'資遣解僱', ic:'📄',
   attack:'我們是因為業務調整資遣你，資遣費、預告都給了，於法有據，你簽一簽就好。',
   refutes:[
    ['勞動基準法 §11','資遣須有<b>法定事由</b>（如業務緊縮、虧損等），且須屬實。'],
    ['解僱最後手段性','實務要求雇主須<b>先嘗試調職、安置、改善</b>，無法避免才能資遣；可安置而未安置，解僱違法、無效。'],
    ['給錢≠合法','給資遣費<b>不等於</b>解僱合法；無法定事由或違反最後手段性，解僱無效、得請求復職與工資。'],
   ],
   evidence:['資遣通知書（理由）','職缺是否仍存在/事後再徵人','你的考績與工作表現紀錄','有無被提供調職/安置'],
   note:'重要：拿到通知<b>先別簽「同意」或「自願離職」</b>，簽了可能被當成合意終止，先諮詢再回應。',
   more:{t:'蒐證指南（解僱資遣）',u:'shouzheng.html'} },
];

var KEY_NONE=0;
var $=function(id){return document.getElementById(id);};
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
var cats=['全部']; TOPICS.forEach(function(t){ if(cats.indexOf(t.cat)<0)cats.push(t.cat); });
var curCat='全部';

function renderPick(){
  $('pick').innerHTML=cats.map(function(c){return '<button data-c="'+c+'"'+(c===curCat?' class="on"':'')+'>'+esc(c)+'</button>';}).join('');
  Array.prototype.forEach.call($('pick').querySelectorAll('button'),function(b){
    b.addEventListener('click',function(){ curCat=b.dataset.c; renderPick(); renderList(); });
  });
}
function refuteText(t){
  var L=['【攻防：'+t.cat+'】',''];
  L.push('🔴 資方主張：'+t.attack,'');
  L.push('⚖️ 法條反駁：');
  t.refutes.forEach(function(r,i){ L.push((i+1)+'. ['+r[0]+'] '+r[1].replace(/<[^>]+>/g,'')); });
  L.push('','📎 要準備的證據：');
  t.evidence.forEach(function(e){ L.push('· '+e); });
  if(t.note) L.push('','⚠ 提醒：'+t.note.replace(/<[^>]+>/g,''));
  L.push('','（高榮企業工會 勞資攻防演練；非正式法律意見，個案洽 1955／律師。）');
  return L.join('\n');
}
function renderList(){
  var arr=TOPICS.filter(function(t){return curCat==='全部'||t.cat===curCat;});
  $('list').innerHTML=arr.map(function(t,idx){
    return '<details class="card" id="d-'+t.id+'">'+
      '<summary><span class="ic">'+t.ic+'</span><span class="qt"><span class="lbl">🔴 資方可能這樣主張（'+esc(t.cat)+'）</span>'+esc(t.attack)+'</span><span class="arr">▸</span></summary>'+
      '<div class="body">'+
        '<div class="sec-h ref">⚖️ 法條反駁</div>'+
        t.refutes.map(function(r){return '<div class="ref-item"><b>'+r[0]+'</b>：'+r[1]+'</div>';}).join('')+
        '<div class="sec-h ev">📎 要準備的證據</div><ul class="ev">'+t.evidence.map(function(e){return '<li>'+esc(e)+'</li>';}).join('')+'</ul>'+
        (t.note?'<div class="note">⚠ '+t.note+'</div>':'')+
        (t.more?'<a class="more" href="'+t.more.u+'">→ '+esc(t.more.t)+'</a><br>':'')+
        '<button class="cp" data-id="'+t.id+'">📋 複製反駁要點</button><span class="cptoast" id="ct-'+t.id+'"></span>'+
      '</div></details>';
  }).join('');
  Array.prototype.forEach.call($('list').querySelectorAll('.cp'),function(b){
    b.addEventListener('click',function(e){
      e.preventDefault();
      var t=TOPICS.find(function(x){return x.id===b.dataset.id;});
      var txt=refuteText(t), tt=$('ct-'+t.id);
      function ok(){ if(tt){tt.textContent='✅ 已複製';setTimeout(function(){tt.textContent='';},2500);} }
      if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(ok,function(){fb(txt);ok();}); } else { fb(txt); ok(); }
      function fb(x){ var ta=document.createElement('textarea');ta.value=x;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(ta); }
    });
  });
}
renderPick(); renderList();
</script>
