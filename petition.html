<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連署／招募進度 · 高榮企業工會</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1A3A6B">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
  :root{
    --navy:#1A3A6B;--navy-mid:#2E5C8A;--navy-deep:#122A4F;--navy-light:#EAF0F8;
    --green:#1A7A4A;--green-light:#EAFAF1;--green-deep:#0F5C36;--green-mid:#2D9D6E;
    --gold:#B7860B;--gold-light:#FEF9E7;
    --red:#C0392B;--red-light:#FDECEA;
    --ink:#1A1A1A;--ink-mid:#444;--ink-soft:#777;--bg:#F4F6FA;
    --card:#fff;--border:#E2E6EC;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7;-webkit-text-size-adjust:100%;}
  .header{background:linear-gradient(160deg,#1A3A6B 0%,#0E2347 100%);color:#fff;padding:1.6rem 1.25rem 1.4rem;text-align:center;}
  .header h1{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;}
  .header p{font-size:12.5px;opacity:.88;margin-top:6px;}
  main{max-width:560px;margin:0 auto;padding:1rem 1rem 4rem;}

  /* 大進度環 */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;margin:1rem 0 .5rem;}
  .ring-outer{position:relative;width:180px;height:180px;}
  .ring-svg{width:180px;height:180px;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:#E8EAF0;stroke-width:16;}
  .ring-fill{fill:none;stroke:var(--green);stroke-width:16;stroke-linecap:round;
    transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);}
  .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-n{font-family:'Noto Serif TC',serif;font-size:46px;font-weight:700;line-height:1;color:var(--navy);}
  .ring-total{font-size:15px;color:var(--ink-soft);margin-top:2px;}
  .ring-pct{font-size:14px;font-weight:700;margin-top:4px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.15rem;margin-bottom:12px;}
  .card h3{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:.7rem;display:flex;align-items:center;gap:8px;}
  .sec-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.06em;margin:1.2rem 0 .5rem 2px;}

  label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin:.6rem 0 .25rem;}
  input[type=number],input[type=text]{width:100%;padding:.6rem .7rem;font-size:15px;font-family:inherit;border:1.5px solid var(--border);border-radius:9px;background:#fff;color:var(--ink);}
  input:focus{outline:none;border-color:var(--navy-mid);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:.68rem 1rem;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .btn.full{width:100%;}
  .btn.navy{background:var(--navy);color:#fff;} .btn.navy:active{background:var(--navy-deep);}
  .btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--navy-mid);}
  .btn.sm{padding:.42rem .72rem;font-size:13px;border-radius:8px;}
  .btn.green{background:var(--green);color:#fff;}

  /* 進度條 */
  .pbar-wrap{margin:.3rem 0 .8rem;}
  .pbar{height:12px;background:#E8EAF0;border-radius:12px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:12px;transition:width .5s;}
  .pbar-fill.done{background:var(--green);}
  .pbar-fill.near{background:var(--gold);}
  .pbar-fill.low{background:var(--navy-mid);}
  .pbar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .recruiter-row{display:flex;align-items:center;gap:9px;padding:.5rem 0;border-bottom:1px solid #F0EDE8;}
  .recruiter-row:last-child{border-bottom:none;}
  .r-name{flex:0 0 72px;font-weight:600;font-size:14px;}
  .r-role{font-size:11.5px;color:var(--ink-soft);flex:0 0 64px;}
  .r-inp{flex:0 0 52px;padding:.38rem .5rem;font-size:15px;font-family:inherit;border:1.5px solid var(--border);border-radius:8px;text-align:center;background:#fff;}
  .r-inp:focus{outline:none;border-color:var(--navy-mid);}
  .r-bar{flex:1;min-width:0;}
  .r-mini-bar{height:8px;background:#E8EAF0;border-radius:8px;overflow:hidden;}
  .r-mini-fill{height:100%;background:var(--navy-mid);border-radius:8px;transition:width .4s;}
  .r-pct{font-size:11px;color:var(--ink-soft);margin-top:2px;text-align:right;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.7rem .5rem;text-align:center;}
  .stat .n{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;line-height:1.1;color:var(--navy);}
  .stat .n.green{color:var(--green-deep);}
  .stat .n.gold{color:var(--gold);}
  .stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}

  .alert{display:flex;gap:9px;align-items:flex-start;border-radius:11px;padding:.75rem .9rem;font-size:13px;line-height:1.7;margin-bottom:10px;}
  .alert.ok{background:var(--green-light);border:1px solid #BFE3CF;color:var(--green-deep);}
  .alert.warn{background:var(--gold-light);border:1px solid #EAD67A;color:#7A5600;}
  .alert.info{background:var(--navy-light);border:1px solid #C2D2E8;color:var(--navy-deep);}

  .toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:rgba(20,20,30,.88);color:#fff;font-size:14px;font-weight:600;padding:10px 20px;
    border-radius:24px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .25s;z-index:999;}
  .toast.show{opacity:1;}

  /* ── 列印：連署書 ── */
  @media print{
    .noprint{display:none!important;}
    body{background:#fff;font-size:13pt;}
    .header,.toast,a[href]{display:none!important;}
    #printSheet{display:block!important;}
  }
  #printSheet{display:none;}
  .print-title{font-family:'Noto Serif TC',serif;font-size:22pt;font-weight:700;text-align:center;margin-bottom:6pt;}
  .print-sub{font-size:11pt;text-align:center;color:#555;margin-bottom:14pt;}
  .sign-table{width:100%;border-collapse:collapse;font-size:11pt;}
  .sign-table th{background:#f0f0f0;padding:6pt 8pt;border:1px solid #bbb;font-weight:700;}
  .sign-table td{padding:10pt 8pt;border:1px solid #bbb;vertical-align:top;}
  .print-foot{font-size:9pt;color:#888;margin-top:10pt;text-align:center;}
</style>
<link rel="stylesheet" href="common.css">
</head>
<body>

<a href="union.html" onclick="return ebnBack(this.getAttribute('href'),event)"
   style="position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:9999;
   background:#fff;color:#333;border:1px solid rgba(0,0,0,.12);font-weight:600;font-size:13px;
   text-decoration:none;padding:6px 12px;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.2)">‹ 功能表</a>

<div class="header noprint">
  <h1>✊ 連署 / 招募進度</h1>
  <p>追蹤 30 人連署目標 · 幹部分工招募 · 進度一目了然</p>
</div>

<main class="noprint">

  <!-- 大進度環 -->
  <div class="ring-wrap">
    <div class="ring-outer">
      <svg class="ring-svg" viewBox="0 0 180 180">
        <circle class="ring-bg" cx="90" cy="90" r="72"/>
        <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="72"
          stroke-dasharray="452.4" stroke-dashoffset="452.4"/>
      </svg>
      <div class="ring-text">
        <div class="ring-n" id="ringN">0</div>
        <div class="ring-total">/ <span id="ringTotal">30</span> 人</div>
        <div class="ring-pct" id="ringPct" style="color:var(--navy-mid)">0%</div>
      </div>
    </div>
  </div>

  <!-- 統計列 -->
  <div class="stat-grid">
    <div class="stat"><div class="n green" id="stActive">—</div><div class="l">已入會</div></div>
    <div class="stat"><div class="n gold" id="stApply">—</div><div class="l">申請中</div></div>
    <div class="stat"><div class="n" id="stPetition">—</div><div class="l">手動連署</div></div>
  </div>

  <div id="alertBox"></div>

  <!-- 設定目標 -->
  <div class="card">
    <h3>⚙️ 目標設定</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label>連署目標人數</label>
        <input type="number" id="targetInp" min="1" max="999" value="30" oninput="saveAndRender()">
      </div>
      <div>
        <label>手動連署人數 <span style="font-size:11px;font-weight:400;color:var(--ink-soft)">（名冊以外）</span></label>
        <input type="number" id="petitionInp" min="0" max="999" value="0" oninput="saveAndRender()">
      </div>
    </div>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.7;">
      💡 「已入會＋申請中」從會員名冊自動讀取；「手動連署」填連署書已簽名但尚未正式入會的人數。
    </div>
  </div>

  <!-- 幹部分工 -->
  <div class="sec-label">幹部分工招募</div>
  <div class="card">
    <div id="recruiterList"><!-- 由 JS 填入 --></div>
    <div style="margin-top:.8rem;font-size:12px;color:var(--ink-soft);">分工小計：已填 <span id="assignedSum" style="font-weight:700;color:var(--navy)">0</span> 人（各幹部填自己「負責接洽的人數」，追蹤進度用）</div>
    <button class="btn ghost full" style="margin-top:.7rem;" onclick="saveCadreAssign()">💾 儲存分工</button>
  </div>

  <!-- 進度條分析 -->
  <div class="card">
    <h3>📊 進度分析</h3>
    <div class="pbar-wrap">
      <div class="pbar"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
      <div class="pbar-label"><span id="pbarLeft"></span><span id="pbarRight"></span></div>
    </div>
    <div id="progressNote" style="font-size:13px;margin-top:.2rem;"></div>
  </div>

  <!-- 操作 -->
  <div style="display:flex;gap:8px;margin-top:.4rem;">
    <button class="btn ghost" onclick="syncFromRoster()" style="flex:1">🔄 從名冊重新讀取</button>
    <button class="btn navy" onclick="printSheet()" style="flex:1">🖨️ 列印連署書</button>
  </div>

</main>

<!-- ── 列印連署書（print only）── -->
<div id="printSheet">
  <div class="print-title" id="printTitle">工會籌組連署書</div>
  <div class="print-sub" id="printSub">高雄榮民總醫院企業工會（籌備中）</div>
  <table class="sign-table">
    <thead>
      <tr>
        <th style="width:8%">序號</th>
        <th style="width:18%">姓名</th>
        <th style="width:22%">服務單位</th>
        <th style="width:15%">員工編號</th>
        <th style="width:17%">聯絡電話</th>
        <th style="width:20%">簽名</th>
      </tr>
    </thead>
    <tbody id="signRows"><!-- 由 JS 填入 --></tbody>
  </table>
  <div class="print-foot">本連署書僅作籌組工會意願確認，個人資料依個資法保護，不對外公開。</div>
</div>

<div id="verBadge">v2026.06.25.00</div>
<div class="toast" id="toast"></div>

<script src="org.js" defer></script>
<script src="law-tips.js" defer></script>
<script src="common.js" defer></script>

<script>
var STORE_KEY = 'ebn_petition_v1';
var ROSTER_KEY = 'roster_members_v1';

function loadData(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; }
}
function saveData(d){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }catch(e){} }

function getRoster(){
  try{ return JSON.parse(localStorage.getItem(ROSTER_KEY)||'[]'); }catch(e){ return []; }
}

/* cadre 分工資料 */
var cadreRows = []; // {key, role, name, assigned}

function buildCadreRows(d){
  var assign = d.assign || {};
  // 從 EBNOrg 讀幹部名單
  var roles = window.EBNOrg ? EBNOrg.CADRE_ROLES : [
    ['chair','理事長'],['fin','總務（一）'],['fin2','總務（二）'],
    ['doc','法規（一）'],['doc2','法規（二）'],['wel','文宣'],['sup','監事']
  ];
  var names = window.EBNOrg ? EBNOrg.cadres() : {};
  cadreRows = roles.map(function(r){
    var name = names[r[0]] || r[1];
    return { key:r[0], role:r[1], name:name, assigned: parseInt(assign[r[0]])||0 };
  });
}

function renderRecruiterList(){
  var el = document.getElementById('recruiterList');
  el.innerHTML = cadreRows.map(function(r, i){
    return '<div class="recruiter-row">'+
      '<div class="r-role">'+r.role+'</div>'+
      '<div class="r-name">'+r.name+'</div>'+
      '<input type="number" class="r-inp" min="0" max="99" value="'+r.assigned+'"'+
        ' oninput="cadreRows['+i+'].assigned=parseInt(this.value)||0;updateAssignedSum()">'+
      '<div class="r-bar">'+
        '<div class="r-mini-bar"><div class="r-mini-fill" id="rbar_'+i+'" style="width:0%"></div></div>'+
        '<div class="r-pct" id="rpct_'+i+'">0%</div>'+
      '</div>'+
    '</div>';
  }).join('');
  updateAssignedSum();
}

function updateAssignedSum(){
  var total = cadreRows.reduce(function(s,r){ return s+r.assigned; }, 0);
  document.getElementById('assignedSum').textContent = total;
  var target = parseInt(document.getElementById('targetInp').value)||30;
  cadreRows.forEach(function(r,i){
    var pct = total > 0 ? Math.min(100, Math.round(r.assigned/target*100)) : 0;
    var fill = document.getElementById('rbar_'+i);
    var pctEl = document.getElementById('rpct_'+i);
    if(fill) fill.style.width = pct+'%';
    if(pctEl) pctEl.textContent = r.assigned+' 人';
  });
}

function saveCadreAssign(){
  var d = loadData();
  d.assign = {};
  cadreRows.forEach(function(r){ d.assign[r.key] = r.assigned; });
  saveData(d);
  toast('✅ 分工已儲存');
}

/* 主渲染 */
function render(){
  var d = loadData();
  var target = parseInt(document.getElementById('targetInp').value)||30;
  var petition = parseInt(document.getElementById('petitionInp').value)||0;

  // 從名冊讀
  var members = getRoster();
  var active = members.filter(function(m){ return m.status==='active'; }).length;
  var apply  = members.filter(function(m){ return m.status==='applicant'; }).length;
  var total  = active + apply + petition;
  var pct    = Math.min(100, Math.round(total/target*100));
  var circ   = 2 * Math.PI * 72; // ≈ 452.4

  document.getElementById('stActive').textContent = active;
  document.getElementById('stApply').textContent  = apply;
  document.getElementById('stPetition').textContent = petition;
  document.getElementById('ringN').textContent   = total;
  document.getElementById('ringTotal').textContent = target;
  document.getElementById('ringPct').textContent  = pct + '%';

  // 顏色
  var color = pct >= 100 ? 'var(--green)' : pct >= 70 ? 'var(--gold)' : 'var(--navy-mid)';
  var fill = document.getElementById('ringFill');
  if(fill){ fill.style.stroke = color; fill.style.strokeDashoffset = circ * (1 - pct/100); }
  document.getElementById('ringPct').style.color = color;

  // 進度條
  var pbarFill = document.getElementById('pbarFill');
  if(pbarFill){
    pbarFill.style.width = pct+'%';
    pbarFill.className = 'pbar-fill ' + (pct>=100?'done':pct>=70?'near':'low');
  }
  document.getElementById('pbarLeft').textContent = total+' / '+target+' 人已達成';
  document.getElementById('pbarRight').textContent = pct+'%';

  // 提示訊息
  var ab = document.getElementById('alertBox');
  var still = target - total;
  if(pct >= 100){
    ab.innerHTML = '<div class="alert ok"><span>🎉</span><div><b>恭喜！連署目標已達成。</b><br>可依章程召開籌備大會，進行下一步登記流程。</div></div>';
  } else if(pct >= 70){
    ab.innerHTML = '<div class="alert warn"><span>💪</span><div>還差 <b>'+still+' 人</b>就達標，加油！目前進度 '+pct+'%。</div></div>';
  } else {
    ab.innerHTML = '<div class="alert info"><span>📋</span><div>工會法第6條：企業工會籌組需<b>同一廠場 30 人以上</b>連署。目前 '+total+' 人，還需 <b>'+Math.max(0,still)+' 人</b>。</div></div>';
  }

  var note = document.getElementById('progressNote');
  if(note){
    var parts = [];
    if(active) parts.push('已入會 '+active+' 人');
    if(apply)  parts.push('申請中 '+apply+' 人');
    if(petition) parts.push('連署書 '+petition+' 人');
    note.textContent = parts.length ? '統計來源：'+parts.join(' ＋ ') : '尚無資料，請在會員名冊新增會員或填寫上方手動連署人數。';
    note.style.color = 'var(--ink-soft)';
  }
}

function saveAndRender(){
  var d = loadData();
  d.target   = parseInt(document.getElementById('targetInp').value)||30;
  d.petition = parseInt(document.getElementById('petitionInp').value)||0;
  saveData(d);
  render();
  updateAssignedSum();
}

function syncFromRoster(){
  render();
  toast('✅ 已從名冊重新讀取');
}

function printSheet(){
  // 填列印區
  var rows = '';
  for(var i=1;i<=30;i++){
    rows += '<tr><td style="text-align:center">'+i+'</td><td></td><td></td><td></td><td></td><td></td></tr>';
  }
  document.getElementById('signRows').innerHTML = rows;
  var orgName = (window.EBNOrg ? EBNOrg.get().fullName : '') || '高雄榮民總醫院企業工會';
  document.getElementById('printSub').textContent = orgName+'（籌備中）';
  window.print();
}

function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

document.addEventListener('DOMContentLoaded', function(){
  var d = loadData();
  document.getElementById('targetInp').value   = d.target   || 30;
  document.getElementById('petitionInp').value = d.petition || 0;

  function init(){
    buildCadreRows(d);
    renderRecruiterList();
    render();
  }
  if(window.EBNOrg) init();
  else { var t=setInterval(function(){ if(window.EBNOrg){ clearInterval(t); init(); }},60); }
  document.addEventListener('ebnorg:public', function(){
    buildCadreRows(loadData());
    renderRecruiterList();
    render();
  });
});
</script>
</body>
</html>
