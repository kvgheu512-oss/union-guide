<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1A3A6B">
<meta name="apple-mobile-web-app-title" content="批次收據">
<title>批次收據（一次多筆＋彙總表）｜高榮企業工會</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1A3A6B;--navy-deep:#122A4F;--ink:#1A1A1A;--ink-soft:#777;--ink-mid:#444;--bg:#F4F6FA;--card:#fff;--border:#D8E0EC;--gold-light:#FEF9E7;--gold-line:#EAD67A;--green:#1A7A4A;--green-deep:#0F5C36;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.8;-webkit-text-size-adjust:100%;}
  .header{background:linear-gradient(160deg,#1A3A6B,#122A4F);color:#fff;padding:1.7rem 1.25rem 1.3rem;text-align:center;}
  .header h1{font-family:'Noto Serif TC',serif;font-size:19px;}
  .header p{font-size:12.5px;opacity:.92;margin-top:6px;}
  main{max-width:640px;margin:0 auto;padding:1.1rem 1.05rem 4rem;}
  .topnote{background:var(--gold-light);border:1px solid var(--gold-line);border-radius:10px;padding:.75rem .95rem;font-size:12.8px;color:#5C4000;margin-bottom:1rem;line-height:1.75;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.05rem 1.1rem;margin-bottom:1rem;border-top:4px solid var(--navy);}
  .card h2{font-family:'Noto Serif TC',serif;color:var(--navy-deep);font-size:16px;margin-bottom:.5rem;}
  label{display:block;font-size:13px;font-weight:700;color:var(--navy-deep);margin:.6rem 0 .25rem;}
  input,textarea{width:100%;padding:.6rem .75rem;font-size:16px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;background:#fff;}
  textarea{min-height:130px;line-height:1.7;font-size:15px;}
  .row2{display:flex;gap:8px;} .row2>div{flex:1;}
  .btn{background:var(--navy);color:#fff;border:0;border-radius:10px;padding:.75rem;font-weight:700;font-size:15px;cursor:pointer;width:100%;margin-top:.6rem;}
  .btn.go{background:var(--green);} .btn.ghost{background:#EAF0FA;color:var(--navy-deep);border:1.5px solid var(--navy);width:auto;padding:.45rem .8rem;font-size:13px;margin:0;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:4px;line-height:1.6;}
  .sum{background:#EAF0FA;border:1px solid #C2D2E8;border-radius:10px;padding:.7rem .9rem;font-size:13.5px;margin-top:.5rem;}
  .sum b{color:var(--navy-deep);}
  .foot{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:1.2rem;}
  #sheets{display:none;}
  @media print{
    body{background:#fff;} .noprint{display:none!important;} main{padding:0;max-width:none;}
    #sheets{display:block;}
    .rcpt{page-break-after:always;padding:1.8cm 2cm;color:#000;}
    .rcpt h3{font-family:'Noto Serif TC',serif;font-size:20px;text-align:center;margin-bottom:1rem;}
    .rcpt table,.summary table{width:100%;border-collapse:collapse;margin:.6rem 0;font-size:14px;}
    .rcpt td,.summary td,.summary th{border:1px solid #000;padding:7px 9px;}
    .rcpt .right{text-align:right;margin-top:1.4rem;}
    .summary{padding:1.8cm 2cm;} .summary h3{font-family:'Noto Serif TC',serif;font-size:20px;text-align:center;margin-bottom:1rem;}
  }
</style>
<link rel="stylesheet" href="common.css">
</head>
<body data-home="union.html">

<div class="header">
  <h1>🧾 批次收據</h1>
  <p>一次貼上多筆繳費 → 批次產生收據 ＋ 彙總表</p>
</div>

<main>
  <div class="topnote noprint">📌 在下面<b>一行一個人</b>貼上「姓名 金額」（用空白或逗號分隔；只填姓名就用預設金額）。會自動編收據號、套工會抬頭，並附一張<b>彙總表</b>。資料只存本機、不上傳。</div>

  <div class="card noprint">
    <h2>① 共同欄位</h2>
    <div class="row2">
      <div><label>年度</label><input id="year" inputmode="tel" placeholder="115"></div>
      <div><label>費別</label><input id="type" placeholder="常年會費"></div>
    </div>
    <div class="row2">
      <div><label>預設金額（沒填金額的人用）</label><input id="defAmt" inputmode="tel" placeholder="200"></div>
      <div><label>收據起始編號</label><input id="startNo" inputmode="tel" placeholder="1"></div>
    </div>
    <div class="hint">收據編號格式：<b>年度-三碼流水</b>（例：115-001）。</div>
  </div>

  <div class="card noprint">
    <h2>② 繳費名單 <button class="btn ghost" id="fromRoster" type="button" style="float:right">＋ 從名冊帶入姓名</button></h2>
    <textarea id="lines" placeholder="王小明 200&#10;李小華 200&#10;陳大文&#10;（一行一人；只填姓名就用預設金額）"></textarea>
    <div class="sum" id="sum"></div>
    <button class="btn go" id="gen" type="button">🖨️ 產生收據＋彙總表（列印 / 存 PDF）</button>
    <div class="hint" id="genhint" style="text-align:center"></div>
  </div>

  <div class="foot noprint">高雄榮民總醫院企業工會（籌備中）· 幹部後台 · 資料僅存本機</div>
  <div id="sheets"></div>
</main>

<div id="verBadge" class="noprint"></div>
<script src="org.js" defer></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
  function money(n){ return "NT$ "+Math.round(n).toLocaleString("en-US"); }
  function parseLines(){
    var def=parseFloat($("defAmt").value)||0;
    return ($("lines").value||"").split(/\n/).map(function(l){return l.trim();}).filter(Boolean).map(function(l){
      var m=l.split(/[\s,，\t]+/);
      var name=m[0]; var amt=m.length>1?parseFloat(m[m.length-1].replace(/[^\d.]/g,"")):NaN;
      if(isNaN(amt)) amt=def;
      return {name:name, amt:amt};
    });
  }
  function pad(n){ n=String(n); while(n.length<3)n="0"+n; return n; }
  function updSum(){
    var rows=parseLines(), tot=rows.reduce(function(s,r){return s+(r.amt||0);},0);
    $("sum").innerHTML=rows.length?('共 <b>'+rows.length+'</b> 筆，合計 <b>'+money(tot)+'</b>'):'貼上名單後，這裡顯示筆數與合計。';
  }
  $("lines").addEventListener("input",updSum);
  $("defAmt").addEventListener("input",updSum);
  $("fromRoster").addEventListener("click",function(){
    var ms=[]; try{ ms=JSON.parse(localStorage.getItem("roster_members_v1"))||[]; }catch(e){}
    if(!ms.length){ $("genhint").textContent="名冊沒有會員，請先到名冊新增/匯入"; return; }
    var def=$("defAmt").value.trim();
    $("lines").value=ms.map(function(m){ return m.name+(def?(" "+def):""); }).join("\n");
    updSum();
  });
  $("gen").addEventListener("click",function(){
    var o=(window.EBNOrg?EBNOrg.get():{});
    var org=o.fullName||"（請先到基本資料中心填工會全名）", chair=o.chair||"____";
    var rows=parseLines(); if(!rows.length){ $("genhint").textContent="請先貼上繳費名單"; return; }
    var year=$("year").value.trim()||new Date().getFullYear()-1911, type=$("type").value.trim()||"會費";
    var start=parseInt($("startNo").value,10)||1, tot=0;
    var rcpts=rows.map(function(r,i){
      tot+=r.amt||0;
      var no=year+"-"+pad(start+i);
      return '<div class="rcpt"><h3>'+esc(org)+' 收據</h3>'+
        '<table><tr><td>收據編號</td><td>'+esc(no)+'</td><td>日期</td><td>'+new Date().toLocaleDateString("zh-TW")+'</td></tr>'+
        '<tr><td>繳款人</td><td>'+esc(r.name)+'</td><td>費別</td><td>'+esc(year)+' 年度 '+esc(type)+'</td></tr>'+
        '<tr><td>金額</td><td colspan="3"><b>'+money(r.amt)+'</b>（新臺幣 '+money(r.amt).replace("NT$ ","")+' 元整）</td></tr></table>'+
        '<p class="right">'+esc(org)+'（蓋章）　理事長 '+esc(chair)+'　經手人 ____</p></div>';
    }).join("");
    var summary='<div class="summary"><h3>'+esc(org)+' '+esc(year)+' 年度 '+esc(type)+' 收費彙總表</h3>'+
      '<table><tr><th>#</th><th>收據編號</th><th>繳款人</th><th>金額</th></tr>'+
      rows.map(function(r,i){ return '<tr><td>'+(i+1)+'</td><td>'+esc(year+"-"+pad(start+i))+'</td><td>'+esc(r.name)+'</td><td>'+money(r.amt)+'</td></tr>'; }).join("")+
      '<tr><td colspan="3" style="text-align:right"><b>合計</b></td><td><b>'+money(tot)+'</b></td></tr></table>'+
      '<p>製表人：____________　　覆核：____________</p></div>';
    $("sheets").innerHTML=rcpts+summary;
    $("genhint").textContent="已產生 "+rows.length+" 張收據＋彙總表，開啟列印中…";
    setTimeout(function(){ window.print(); $("genhint").textContent="已產生 "+rows.length+" 張收據＋彙總表（列印畫面可選『儲存成 PDF』）"; },200);
  });
  updSum();
})();
</script>
<script src="common.js" defer></script>
</body>
</html>
