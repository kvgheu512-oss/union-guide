<div class="header">
  <h1>🤖 工會小幫手</h1>

<main>
  <div class="topnote">📌 <b>直接打字問我就好</b>，例如：「特休沒休完有錢嗎」「加班費怎麼算」「被扣全勤合不合法」「約用能不能入會」。我會<b>馬上給你白話答案＋法律依據＋下一步怎麼做</b>，多數問題當場解決，不用等幹部、不用先懂法規。也可以點下面的分類慢慢逛。</div>

  <div class="jbot" id="jbot">
    <div class="jbot-top">
      <div class="ava">🤖</div>
      <div><div class="nm">工會小幫手</div><div class="tg">打字或點按鈕都可以 · 答案即時跳出</div></div>

    <div class="jbot-chips" id="jbot-chips"></div>
    <div class="jbot-input">
      <input id="jbot-in" type="text" placeholder="打字問我，例如：特休沒休完有錢嗎？" enterkeyhint="search" autocomplete="off">
      <button id="jbot-send" type="button" aria-label="問">➤</button>
    </div>
  </div>

  <div class="foot">高雄榮民總醫院企業工會（籌備中）· 答案為整理參考、非正式法律意見，正式以法規與官方公告為準<br>個資只存你的裝置、不上傳 · 真的卡關，打勞工專線 1955 或在 LINE 群找幹部</div>

  var CATS=[
    {t:"💰 薪水・加班費",ids:["ot_day","ot_holiday","annual_cash","annual_days","payslip"]},
    {t:"🏖 請假・特休",ids:["sick","marriage","funeral","maternity","period","familycare","personal","training","typhoon","comp"]},
    {t:"🤕 受傷・職災",ids:["injury","injury_block"]},
    {t:"🛡 被刁難・權益",ids:["bully","layoff","insurance","schedule","appeal"]},
    {t:"📝 入會・會費",ids:["can_join","benefit","how_join","fee","quit","what_union"]},
    {t:"🧾 財務・補助",ids:["receipt","subsidy"]},
    {t:"🙋 其他・找人",ids:["privacy","lawyer","contact"]}
  ];
  var BYID={}; KB.forEach(function(e){BYID[e.id]=e;});

  // 熱門問題（首屏直接秀，第一眼就擊中）
  var HOT=["ot_day","annual_cash","sick","injury","can_join","subsidy"];

  function norm(s){return (s||"").toLowerCase().replace(/[\s,，。、？?！!.~～·・:：；;「」『』（）()]/g,"");}
  function search(q){
    var nq=norm(q); if(!nq) return [];
    var out=KB.map(function(e){
      var sc=0, nt=norm(e.t);
      if(nt && nq.indexOf(nt)>=0) sc+=nt.length*2;
      e.k.forEach(function(key){var nk=norm(key); if(!nk) return;
        if(nq.indexOf(nk)>=0) sc+=nk.length*3;          // 命中關鍵詞最重要
        else if(nk.length>=2 && nk.indexOf(nq)>=0 && nq.length>=2) sc+=nq.length;
      });
      return {e:e,sc:sc};
    }).filter(function(x){return x.sc>0;});
    out.sort(function(a,b){return b.sc-a.sc;});
    return out;
  }

  var jlog=document.getElementById("jbot-log"), jchips=document.getElementById("jbot-chips");
  var jin=document.getElementById("jbot-in"), jsend=document.getElementById("jbot-send");
  function bub(html,who){var d=document.createElement("div");d.className="b "+who;d.innerHTML=html;jlog.appendChild(d);jlog.scrollTop=jlog.scrollHeight;}
  // chips：item = {t, id?(看答案) , href?(外連/內頁) , cat?(展開分類) , fn?, cls?}
  function chips(items){
    jchips.innerHTML="";
    items.forEach(function(c){
      var el;
      if(c.href){el=document.createElement("a");el.href=c.href;el.textContent=c.t;
        if(/^https?:|^tel:/.test(c.href)){el.target="_blank";el.rel="noopener";}}
      else{el=document.createElement("button");el.type="button";el.textContent=c.t;if(c.cls)el.className=c.cls;
        el.addEventListener("click",function(){ if(c.fn){c.fn();} });}
      jchips.appendChild(el);
    });
  }
  function relatedChips(){
    return [{t:"📂 看全部分類",cls:"cat",fn:showCats},{t:"🔁 重新開始",cls:"again",fn:greet}];
  }
  function answer(e){
    bub("<b>"+e.t+"</b>","me");
    e.a.forEach(function(s){bub(s,"bot");});
    var items=(e.go||[]).slice();
    // 同分類其它常見問題（讓他順手再解一題），最多 3 個
    var sib=(CATS.filter(function(c){return c.ids.indexOf(e.id)>=0;})[0]||{ids:[]}).ids
      .filter(function(id){return id!==e.id;}).slice(0,3)
      .map(function(id){return {t:BYID[id].t,fn:function(){answer(BYID[id]);}};});
    items=items.concat(sib);
    items.push({t:"還是想找人？",fn:function(){answer(BYID["contact"]);}});
    items.push({t:"📂 其它分類",cls:"cat",fn:showCats});
    chips(items);
  }
  function showCats(){
    bub("好，<b>選一個分類</b>，或直接打字問我更快：","bot");
    chips(CATS.map(function(c){return {t:c.t,cls:"cat",fn:function(){showCat(c);}};})
      .concat([{t:"🔁 重新開始",cls:"again",fn:greet}]));
  }
  function showCat(c){
    bub(c.t+"，<b>常見問題：</b>","bot");
    chips(c.ids.map(function(id){return {t:BYID[id].t,fn:function(){answer(BYID[id]);}};})
      .concat([{t:"📂 其它分類",cls:"cat",fn:showCats}]));
  }
  function handleType(q){
    q=(q||"").trim(); if(!q) return;
    bub(q,"me");
    var res=search(q);
    if(!res.length){
      bub("這題我一時對不到答案😅 但別擔心——你可以<b>選個分類</b>，或直接<b>找工會</b>，把狀況講清楚我們幫你處理。","bot");
      chips(CATS.map(function(c){return {t:c.t,cls:"cat",fn:function(){showCat(c);}};})
        .concat([{t:"📱 加入 LINE 群",href:LINE_URL},{t:"☎️ 打 1955",href:"tel:1955"}]));
      return;
    }
    // 信心夠（最高分明顯領先，或只有一個）→ 直接給答案
    if(res.length===1 || res[0].sc>=res[1].sc*1.6 || res[0].sc>=18){ answer(res[0].e); return; }
    // 否則列出最像的幾題讓他點
    bub("你是不是想問這幾個？點一下我馬上回答：","bot");
    chips(res.slice(0,4).map(function(x){return {t:x.e.t,fn:function(){answer(x.e);}};})
      .concat([{t:"都不是，看全部分類",cls:"cat",fn:showCats}]));
  }
  function greet(){
    jlog.innerHTML="";
    bub("你好，我是<b>工會小幫手</b>🤖。<b>直接打字問我</b>就好（例如：特休沒休完有錢嗎、被扣全勤合不合法），我馬上給你答案。","bot");
    bub("不知道怎麼問？點下面<b>熱門問題</b>，或「看全部分類」：","bot");
    chips(HOT.map(function(id){return {t:BYID[id].t,fn:function(){answer(BYID[id]);}};})
      .concat([{t:"📂 看全部分類",cls:"cat",fn:showCats}]));
  }

  jsend.addEventListener("click",function(){var v=jin.value;jin.value="";handleType(v);});
  jin.addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();var v=jin.value;jin.value="";handleType(v);}});
  greet();

  // 從別頁帶 ?q=... 進來可直接問（保留擴充用）
  try{var qq=(location.search.match(/[?&]q=([^&]+)/)||[])[1]; if(qq) handleType(decodeURIComponent(qq));}catch(e){}
})();
</script>
