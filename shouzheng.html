<style>
 :root{--ac:#7B1818;--ac2:#C0392B;--ink:#1A1A1A;--ink-soft:#777;--ink-mid:#444;--bg:#F7F6F3;--card:#fff;--border:#E6E1D8;--gold-light:#FEF9E7;--green:#0F5C36;--green-light:#E9F6EF;}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.8}
 .header{background:linear-gradient(160deg,#7B1818,#4A0E0E);color:#fff;padding:1.8rem 1.25rem 1.4rem;text-align:center}
 .header h1{font-family:'Noto Serif TC',serif;font-size:21px}
 .header p{font-size:12.5px;opacity:.92;margin-top:6px;line-height:1.7}
 main{max-width:680px;margin:0 auto;padding:1.1rem 1.05rem 4rem}
 .principle{background:var(--gold-light);border:1px solid #EAD67A;border-radius:12px;padding:.85rem 1rem;font-size:13px;color:#5C4000;line-height:1.85;margin-bottom:1rem}
 .principle b{color:var(--ac)}
 .goal{background:var(--green-light);border:1px solid #BFE3CF;border-radius:12px;padding:.7rem .95rem;font-size:12.5px;color:var(--green);line-height:1.8;margin-bottom:1.1rem;font-weight:500}
 .cat-pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem}
 .cat-pick button{font-size:13px;padding:.5rem .8rem;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--ac);cursor:pointer;font-family:inherit}
 .cat-pick button.on{background:var(--ac);color:#fff;border-color:var(--ac)}
 .cat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.15rem;margin-bottom:1rem}
 .cat h2{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--ac);margin-bottom:.2rem}
 .cat .law{font-size:12px;color:var(--ink-soft);margin-bottom:.7rem}
 .prog{height:8px;background:#EFEAE2;border-radius:99px;overflow:hidden;margin:.5rem 0 .9rem}
 .prog>span{display:block;height:100%;background:var(--green);width:0;transition:width .3s}
 .prog-label{font-size:12px;color:var(--green);font-weight:700;margin-bottom:.5rem}
 .warn{background:#FDECEA;border:1.5px solid #F0C5C2;border-radius:10px;padding:.7rem .85rem;font-size:13px;color:#7B1818;line-height:1.8;margin-bottom:.8rem}
 .warn b{font-weight:700}
 .tier{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;margin:.7rem 0 .2rem;display:flex;align-items:center;gap:6px}
 .tier.must{color:var(--ac2)} .tier.sub{color:var(--ink-mid)} .tier.extra{color:var(--navy,#1A3A6B)}
 .tier .tag{font-family:'Noto Sans TC';font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:99px}
 .tier.must .tag{background:#FDECEA;color:#C0392B;border:1px solid #F0C5C2}
 .tier.sub .tag{background:#F0EEEA;color:#777;border:1px solid var(--border)}
 .tier.extra .tag{background:#EEF2F8;color:#1A3A6B;border:1px solid #D8E1EE}
 label.item.extra .t{color:#1A3A6B}
 .tier-note{font-size:11.5px;color:var(--ink-soft);margin:.1rem 0 .3rem;line-height:1.6}
 label.item{display:flex;gap:10px;align-items:flex-start;padding:.5rem .2rem;border-bottom:1px solid #F2EEE7;cursor:pointer}
 label.item:last-child{border-bottom:none}
 label.item input{margin-top:3px;width:20px;height:20px;flex-shrink:0;accent-color:var(--green)}
 label.item .t{font-size:14px}
 label.item.must .t{font-weight:600}
 label.item .why{display:block;font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.6}
 label.item.done .t{color:var(--ink-soft);text-decoration:line-through;font-weight:400}
 .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:.9rem}
 .btn{flex:1;min-width:130px;text-align:center;border:none;border-radius:10px;padding:.7rem;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
 .btn.copy{background:var(--ac);color:#fff}
 .btn.reset{background:#fff;border:1.5px solid var(--border);color:var(--ink-mid)}
 .toast{text-align:center;font-size:13px;color:var(--green);font-weight:700;min-height:18px;margin-top:8px}
 .tip{background:var(--green-light);border:1px solid #BFE3CF;border-radius:10px;padding:.7rem .85rem;font-size:12.5px;color:var(--green);line-height:1.8;margin-top:.7rem}
 .more{display:block;margin-top:.6rem;font-size:13px;color:var(--ac);font-weight:700;text-decoration:none}
 .vflag{color:#B7860B;font-size:11px}
 .foot{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:1.4rem;line-height:1.8}
</style>

<div class="header">
  <h1>🛡️ 蒐證指南</h1>
  <p>遇到不合理對待，先別衝突——把證據留好。<br>選你的情況，照著打勾完成蒐證。</p>
</div>

<main>
  <div class="principle">
    📌 <b>蒐證四原則</b>：①<b>即時記錄</b>（時間、地點、人、事，當天就寫）。②<b>保留原始檔</b>（截圖＋原訊息都留）。③<b>多備份</b>（雲端＋手機＋email 給自己一份）。④<b>你是對話的一方可合法錄音</b>；但別打草驚蛇、先別起衝突。
  </div>
  <div class="goal">🎯 <b>用法</b>：先把<span style="color:var(--ac2);font-weight:700">必要證據</span>收齊（非有不可），再補次要證據，然後按「複製清單」拿給幹部——<b>自己先收好證據、掌握時效</b>，才不會錯過 90 天裁決、5 年加班費等期限而影響權益。</div>

  <div class="cat-pick" id="cat-pick"></div>
  <div id="cat-box"></div>

  <div class="foot">高雄榮民總醫院企業工會（籌備中）· 勾選紀錄只存在你的手機，不上傳<br><span class="vflag">⚠ 法條與時效為一般整理，個案請洽工會幹部或勞工局 1955 確認</span></div>
</main>

function esc(s){return (s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function k(cid,tier,i){ return cid+':'+tier+':'+i; }

function renderPick(){
  $('cat-pick').innerHTML=CATS.map(function(c){
    return '<button data-id="'+c.id+'"'+(c.id===cur?' class="on"':'')+'>'+c.icon+' '+esc(c.name)+'</button>';
  }).join('');
  Array.prototype.forEach.call($('cat-pick').querySelectorAll('button'),function(b){
    b.addEventListener('click',function(){ cur=b.dataset.id; renderPick(); renderCat(); window.scrollTo({top:0,behavior:'smooth'}); });
  });
}

  var arr=c[tier]||[];
  return arr.map(function(it,i){
    var on=!!state[k(c.id,tier,i)];
    return '<label class="item '+tier+(on?' done':'')+'"><input type="checkbox" data-tier="'+tier+'" data-i="'+i+'"'+(on?' checked':'')+'>'+
      '<span><span class="t">'+esc(it[0])+'</span><span class="why">'+esc(it[1])+'</span></span></label>';
  }).join('');
}
var TIERS=[
 {key:'must',label:'🔴 必要證據',tag:'非有不可',note:''},
 {key:'sub',label:'⚪ 次要證據',tag:'加分／補強',note:''},
 {key:'extra',label:'⚖️ 補充證據',tag:'法院實務常採認',note:'這些是實務上法院／裁決會常採認、能強化證明力的證據類型，有就盡量補。'},
];
function tierLen(c,t){return (c[t]||[]).length;}
function tierDone(c,t){return (c[t]||[]).reduce(function(n,_,i){return n+(state[k(c.id,t,i)]?1:0);},0);}
function renderCat(){
  var c=CATS.find(function(x){return x.id===cur;});
  var all=0,done=0; TIERS.forEach(function(T){all+=tierLen(c,T.key);done+=tierDone(c,T.key);});
  var mustDone=tierDone(c,'must');
  var pct=all?Math.round(done/all*100):0;
  var html='<div class="cat"><h2>'+c.icon+' '+esc(c.name)+'</h2><div class="law">'+esc(c.law)+'</div>';
  if(c.warn) html+='<div class="warn">'+c.warn+'</div>';
  html+='<div class="prog-label">必要證據 '+mustDone+'/'+tierLen(c,'must')+'　·　全部 '+done+'/'+all+'　('+pct+'%)</div>'+
    '<div class="prog"><span style="width:'+pct+'%"></span></div>';
  TIERS.forEach(function(T){
    if(!tierLen(c,T.key)) return;
    html+='<div class="tier '+T.key+'">'+T.label+' <span class="tag">'+T.tag+'</span></div>';
    if(T.note) html+='<div class="tier-note">'+esc(T.note)+'</div>';
    html+=itemsHTML(c,T.key);
  });
  if(c.tip) html+='<div class="tip">💡 '+esc(c.tip)+'</div>';
  if(c.more) html+='<a class="more" href="'+c.more.u+'">→ '+esc(c.more.t)+'</a>';
  html+='<div class="btns"><button class="btn copy" id="cp">📋 複製這份清單（給幹部／律師）</button>'+
    '<button class="btn reset" id="rs">清除本類勾選</button></div><div class="toast" id="tt"></div></div>';
  $('cat-box').innerHTML=html;
  Array.prototype.forEach.call($('cat-box').querySelectorAll('input'),function(inp){
    inp.addEventListener('change',function(){ state[k(c.id,inp.dataset.tier,inp.dataset.i)]=inp.checked; save(); renderCat(); });
  });
  $('cp').addEventListener('click',function(){ copyList(c); });
  $('rs').addEventListener('click',function(){ TIERS.forEach(function(T){(c[T.key]||[]).forEach(function(_,i){delete state[k(c.id,T.key,i)];});}); save(); renderCat(); });
}
function copyList(c){
  var L=['【蒐證清單】'+c.name+'（'+c.law+'）',''];
  var HEAD={must:'■ 必要證據（非有不可）',sub:'■ 次要證據（加分／補強）',extra:'■ 補充證據（法院實務常採認）'};
  TIERS.forEach(function(T){
    if(!(c[T.key]||[]).length) return;
    L.push(HEAD[T.key]);
    (c[T.key]||[]).forEach(function(it,i){ L.push((state[k(c.id,T.key,i)]?'✅ ':'⬜ ')+it[0]+'　— '+it[1]); });
    L.push('');
  });
  L.push('（高榮企業工會蒐證指南產生；✅＝已備齊，⬜＝待補。請掌握時效，盡早找幹部協助。）');
  var txt=L.join('\n');
  function ok(){ var t=$('tt'); if(t){ t.textContent='✅ 已複製，貼到 LINE 給幹部或附給律師'; setTimeout(function(){t.textContent='';},3000);} }
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(ok,function(){fb(txt);ok();}); } else { fb(txt); ok(); }
  function fb(t){ var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); }
}
renderPick(); renderCat();
</script>

    { sel:"#cat-pick", title:"選你的情況", text:"先在這裡照你的情況分類，證據分三種：主要的、次要的、還有補充的。" },
    { sel:"#cat-box", title:"逐項打勾", text:"像出勤紀錄、對話截圖、公告、錄音，都可能是證據，一項一項打勾完成，越完整你越有力。" },

  ], {}); });
