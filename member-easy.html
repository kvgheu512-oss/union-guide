<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>逐件精審台｜法規組</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3A6B;--green:#1A7A4A;--gold:#8A6500;--ink:#1A1A1A;--soft:#666;--bg:#F0F4FA;--card:#fff;--border:#D0DAF0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.8;-webkit-text-size-adjust:100%;}
.header{background:linear-gradient(135deg,#1A3A6B,#0E2347);color:#fff;padding:1.4rem 1rem 1rem;text-align:center;}
.header h1{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;}
.header p{font-size:12px;opacity:.8;margin-top:4px;}
main{max-width:520px;margin:0 auto;padding:.9rem .9rem 5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.85rem;}
.section-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:.7rem;padding-bottom:.4rem;border-bottom:2px solid var(--border);}

/* 新件卡 */
.new-card{background:var(--card);border:2px solid var(--navy);border-radius:18px;padding:1.2rem 1.1rem;margin-bottom:.85rem;}
.new-badge{display:inline-block;background:var(--navy);color:#fff;font-size:12px;font-weight:700;border-radius:10px;padding:2px 10px;margin-bottom:.6rem;}
.new-name{font-size:22px;font-weight:700;margin-bottom:.2rem;}
.new-meta{font-size:13px;color:var(--soft);line-height:1.8;}
.mt-tag{display:inline-block;font-size:12px;font-weight:700;border-radius:10px;padding:2px 9px;margin-top:.3rem;}
.mt-regular{background:#E8F5E9;color:#1B5E20;}
.mt-support{background:#FFF3E0;color:#B45309;}
.btn-confirm{display:block;width:100%;background:var(--green);color:#fff;border:0;border-radius:14px;padding:1rem;font-size:18px;font-weight:700;cursor:pointer;margin-top:.9rem;letter-spacing:.05em;}
.btn-confirm:active{background:#0F5C36;}
.btn-pending{display:block;width:100%;background:#fff;color:var(--gold);border:2px solid #E9C46A;border-radius:14px;padding:.7rem;font-size:15px;font-weight:700;cursor:pointer;margin-top:.5rem;}

/* 已審清單 */
.done-item{padding:.6rem .8rem;border-radius:10px;border:1px solid var(--border);margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem;}
.done-item.done{background:#F0FFF4;}
.done-item.pending{background:#FFFBEA;border-color:#E9C46A;}
.done-name{font-weight:700;font-size:14px;flex:1;}
.done-meta{font-size:12px;color:var(--soft);}
.done-badge{font-size:11px;font-weight:700;border-radius:8px;padding:2px 7px;}
.done-badge.done{background:#D1FAE5;color:#065F46;}
.done-badge.pending{background:#FEF3C7;color:#92400E;}

/* 空態 */
.empty{text-align:center;padding:2rem;color:var(--soft);}
.empty .icon{font-size:42px;margin-bottom:.5rem;}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:.6rem 1.3rem;border-radius:20px;font-size:15px;font-weight:700;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.3);display:none;}
</style>
</head>
<body>
<a href="union.html" style="position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:999;background:#fff;color:#1A3A6B;border:1px solid rgba(0,0,0,.12);font-size:13px;font-weight:600;text-decoration:none;padding:6px 12px;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.2);">‹ 功能表</a>

<div class="header">
  <h1>📂 逐件精審台</h1>
  <p>法規組 · 逐筆確認、一鍵記錄</p>
</div>

<main>
  <!-- 匯入新件 -->
  <div id="newSection" style="display:none">
    <div class="new-card" id="newCard">
      <span class="new-badge">📬 新申請到了</span>
      <div class="new-name" id="nc-name"></div>
      <div class="new-meta" id="nc-meta"></div>
      <div id="nc-type"></div>
      <button class="btn-confirm" id="btnOK">✅ 確認收件，記錄完成</button>
      <button class="btn-pending" id="btnPend">⏳ 暫放：需要補件</button>
    </div>
  </div>

  <!-- 待處理 -->
  <div id="pendingSection">
    <div class="card">
      <div class="section-title">⏳ 等待處理</div>
      <div id="pendingList"></div>
    </div>
  </div>

  <!-- 已完成 -->
  <div id="doneSection">
    <div class="card">
      <div class="section-title">✅ 已審完成</div>
      <div id="doneList"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
var DB_NAME='ebn_members_v1', STORE='members';
function openDB(cb){
  var r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=function(e){ e.target.result.createObjectStore(STORE,{keyPath:'id',autoIncrement:true}); };
  r.onsuccess=function(e){ cb(null,e.target.result); };
  r.onerror=function(){ cb(new Error('DB')); };
}
function dbAdd(rec,cb){ openDB(function(e,db){ if(e){cb&&cb(e);return;} var tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).add(rec); tx.oncomplete=function(){cb&&cb(null);}; }); }
function dbGetAll(cb){ openDB(function(e,db){ if(e){cb([]);return;} var r=db.transaction(STORE,'readonly').objectStore(STORE).getAll(); r.onsuccess=function(){cb(r.result||[]);}; r.onerror=function(){cb([]);}; }); }
function dbUpdate(id,patch,cb){ openDB(function(e,db){ if(e){cb&&cb(e);return;} var tx=db.transaction(STORE,'readwrite'); var os=tx.objectStore(STORE); var r=os.get(id); r.onsuccess=function(){ var rec=r.result; Object.assign(rec,patch); os.put(rec); }; tx.oncomplete=function(){cb&&cb(null);}; }); }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(function(){ t.style.display='none'; },2200); }

var pendingImport=null;

function render(){
  dbGetAll(function(all){
    var newItems=all.filter(function(r){ return !r.status||r.status==='new'; }).sort(function(a,b){ return (b.importedAt||0)-(a.importedAt||0); });
    var pendItems=all.filter(function(r){ return r.status==='pending'; }).sort(function(a,b){ return (b.importedAt||0)-(a.importedAt||0); });
    var doneItems=all.filter(function(r){ return r.status==='done'; }).sort(function(a,b){ return (b.importedAt||0)-(a.importedAt||0); });

    // 待處理
    var pList=document.getElementById('pendingList');
    pList.innerHTML='';
    if(newItems.length===0&&pendItems.length===0){
      pList.innerHTML='<div class="empty"><div class="icon">🎉</div><div>目前沒有待處理件</div></div>';
    } else {
      newItems.concat(pendItems).forEach(function(r){
        var isPend=r.status==='pending';
        var d=document.createElement('div');
        d.className='done-item '+(isPend?'pending':'');
        d.innerHTML=
          '<div style="flex:1"><div class="done-name">'+esc(r.name)+'<span style="font-size:12px;color:var(--soft);font-weight:400;margin-left:.4rem">'+esc(r.empid)+'</span></div>'+
          '<div class="done-meta">'+esc(r.dept||'—')+'　'+esc(r.date||'—')+'</div></div>'+
          '<div style="display:flex;flex-direction:column;gap:.3rem;align-items:flex-end">'+
          '<span class="done-badge '+(isPend?'pending':'done')+'">'+(isPend?'待補件':'待確認')+'</span>'+
          '<button onclick="quickDone('+r.id+')" style="background:var(--green);color:#fff;border:0;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer">✅ 完成</button>'+
          '</div>';
        pList.appendChild(d);
      });
    }

    // 已完成
    var dList=document.getElementById('doneList');
    dList.innerHTML='';
    if(doneItems.length===0){
      dList.innerHTML='<div style="color:var(--soft);font-size:13px;text-align:center;padding:.5rem">尚無完成紀錄</div>';
    } else {
      doneItems.slice(0,15).forEach(function(r){
        var d=document.createElement('div');
        d.className='done-item done';
        d.innerHTML=
          '<div style="flex:1"><div class="done-name">'+esc(r.name)+'<span style="font-size:12px;color:var(--soft);font-weight:400;margin-left:.4rem">'+esc(r.empid)+'</span></div>'+
          '<div class="done-meta">'+esc(r.dept||'—')+'　完成時間：'+esc(r.doneAt||r.ts||'—')+'</div></div>'+
          '<span class="done-badge done">已完成</span>';
        dList.appendChild(d);
      });
      if(doneItems.length>15){
        dList.innerHTML+='<div style="font-size:12px;color:var(--soft);text-align:center;margin-top:.3rem">還有 '+(doneItems.length-15)+' 筆已完成紀錄，請至批次管理查看</div>';
      }
    }
  });
}

function quickDone(id){
  var now=new Date();
  var doneAt='民國'+(now.getFullYear()-1911)+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
  dbUpdate(id,{status:'done',doneAt:doneAt},function(){ render(); toast('✅ 已標記完成'); });
}

// 匯入（URL hash）
function checkImport(){
  var hash=location.hash;
  if(!hash.startsWith('#import=')) return;
  var enc=hash.slice(8);
  var rec;
  try{ rec=JSON.parse(decodeURIComponent(escape(atob(enc)))); }
  catch(e){ toast('⚠️ 連結格式有誤'); return; }
  if(!rec.name||!rec.empid){ toast('⚠️ 資料不完整'); return; }

  pendingImport=rec;
  var mt=rec.memberType||'regular';
  document.getElementById('nc-name').textContent=rec.name+'（'+rec.empid+'）';
  document.getElementById('nc-meta').innerHTML=
    '職稱：'+esc(rec.title||'—')+'　單位：'+esc(rec.dept||'—')+'<br>'+
    '手機：'+esc(rec.phone||'—')+
    (rec.email?'　Email：'+esc(rec.email):'')+
    '<br>申請日期：'+esc(rec.date||'—')+'　申請時間：'+esc(rec.ts||'—');
  document.getElementById('nc-type').innerHTML=
    '<span class="mt-tag '+(mt==='support'?'mt-support':'mt-regular')+'">'+(mt==='support'?'🤝 贊助會員':'✅ 正式會員')+'</span>';

  document.getElementById('newSection').style.display='block';
  history.replaceState(null,'',location.pathname);
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('btnOK').addEventListener('click',function(){
  if(!pendingImport) return;
  var now=new Date();
  var doneAt='民國'+(now.getFullYear()-1911)+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
  var toSave=Object.assign({},pendingImport,{status:'done',importedAt:Date.now(),doneAt:doneAt});
  dbAdd(toSave,function(){
    document.getElementById('newSection').style.display='none';
    pendingImport=null;
    render();
    toast('✅ 收件完成，已記錄！');
  });
});

document.getElementById('btnPend').addEventListener('click',function(){
  if(!pendingImport) return;
  var toSave=Object.assign({},pendingImport,{status:'pending',importedAt:Date.now()});
  dbAdd(toSave,function(){
    document.getElementById('newSection').style.display='none';
    pendingImport=null;
    render();
    toast('⏳ 已記錄為待補件');
  });
});

render();
checkImport();
</script>
<script src="common.js" defer></script>
</body>
</html>
